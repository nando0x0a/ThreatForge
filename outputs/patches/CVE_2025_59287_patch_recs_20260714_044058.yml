# DRAFT FOR ANALYST REVIEW — CVE-2025-59287
# Remediation Playbook: Microsoft WSUS Deserialization RCE
# CVE: CVE-2025-59287 | CVSS: 9.8 CRITICAL | CISA KEV: ACTIVELY EXPLOITED
# Platform: Windows Server (WSUS role hosts)
# ANALYST ACTION REQUIRED:
#   - Confirm the exact KB number from MSRC before populating kb_number below.
#   - Verify target_group matches your WSUS server inventory group.
#   - Test in non-production before production rollout.
#   - Requires ansible.windows collection: ansible-galaxy collection install ansible.windows

- name: "Remediate CVE-2025-59287 — WSUS Deserialization RCE on {{ target_group }}"
  hosts: "{{ target_group }}"
  gather_facts: true
  vars:
    cve_id: "CVE-2025-59287"
    affected_component: "Windows Server Update Services (WSUS)"
    # ANALYST: Replace KBXXXXXXX with the confirmed KB number from MSRC advisory
    kb_number: "KBXXXXXXX"
    wsus_service_name: "WsusService"
    w3svc_service_name: "W3SVC"

  tasks:

    - name: "Assert platform is Windows"
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Windows"
        fail_msg: >
          This playbook targets Windows Server hosts only.
          CVE-2025-59287 affects Microsoft WSUS. Aborting on non-Windows host.

    - name: "Check current Windows Update status — pre-patch snapshot"
      ansible.windows.win_shell: |
        $Session = New-Object -ComObject Microsoft.Update.Session
        $Searcher = $Session.CreateUpdateSearcher()
        $Result = $Searcher.Search("IsInstalled=0 and Type='Software'")
        Write-Output "Pending updates count: $($Result.Updates.Count)"
      register: pre_patch_update_status
      changed_when: false

    - name: "Log pre-patch status"
      ansible.builtin.debug:
        msg: "{{ cve_id }} pre-patch check on {{ inventory_hostname }}: {{ pre_patch_update_status.stdout }}"

    - name: "Install security update for {{ cve_id }} via Windows Update"
      ansible.windows.win_updates:
        category_names:
          - SecurityUpdates
          - CriticalUpdates
        whitelist:
          - "{{ kb_number }}"
        state: installed
        reboot: false
      register: patch_result

    - name: "Log patch installation result"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} patch result on {{ inventory_hostname }}:
          installed={{ patch_result.installed_update_count | default('unknown') }}
          failed={{ patch_result.failed_update_count | default('unknown') }}
          reboot_required={{ patch_result.reboot_required | default('unknown') }}

    - name: "Stop WSUS service before post-patch service restart"
      ansible.windows.win_service:
        name: "{{ wsus_service_name }}"
        state: stopped
      when: patch_result.changed
      ignore_errors: true
      register: wsus_stop_result

    - name: "Stop IIS (W3SVC) — WSUS depends on IIS"
      ansible.windows.win_service:
        name: "{{ w3svc_service_name }}"
        state: stopped
      when: patch_result.changed
      ignore_errors: true

    - name: "Start IIS (W3SVC)"
      ansible.windows.win_service:
        name: "{{ w3svc_service_name }}"
        state: started
      when: patch_result.changed

    - name: "Start WSUS service"
      ansible.windows.win_service:
        name: "{{ wsus_service_name }}"
        state: started
      when: patch_result.changed

    - name: "Verify WSUS service is running post-patch"
      ansible.windows.win_service:
        name: "{{ wsus_service_name }}"
      register: wsus_service_state
      changed_when: false

    - name: "Assert WSUS service is running"
      ansible.builtin.assert:
        that:
          - wsus_service_state.state == "running"
        fail_msg: >
          WSUS service is not running after patch application on {{ inventory_hostname }}.
          Manual investigation required. CVE: {{ cve_id }}.
        success_msg: "WSUS service confirmed running on {{ inventory_hostname }}."

    - name: "Flag if reboot is required"
      ansible.builtin.debug:
        msg: >
          WARNING: Reboot required on {{ inventory_hostname }} to complete
          remediation of {{ cve_id }}. Schedule reboot during next maintenance window.
      when: patch_result.reboot_required | default(false)

    - name: "Audit log — remediation record"
      ansible.builtin.debug: