## Patch Recommendation

> **DRAFT — For analyst review before deployment. Verify package versions against your distribution and environment before executing.**

**CVE:** CVE-2021-41773
**Affected Product:** Apache HTTP Server (httpd) versions 2.4.49 only. Note: the original patch for CVE-2021-41773 was incomplete; CVE-2021-42013 extends this vulnerability to Apache HTTP Server 2.4.50. Both versions are affected and must be remediated.
**Fixed Version:** Apache HTTP Server 2.4.51 or later (resolves both CVE-2021-41773 and CVE-2021-42013). On Debian/Ubuntu systems, the fixed package is `apache2` at the distribution-backported version containing upstream 2.4.51+. Confirm the exact fixed package version for your distribution via `apt-cache policy apache2` after updating the cache.
**Urgency:** IMMEDIATE — within 2 hours of approval. This vulnerability is actively exploited in the wild (CISA KEV), carries a CVSS score of 9.8, and enables unauthenticated remote code execution via path traversal against CGI-enabled or misconfigured Apache instances. The original patch was insufficient; treat both CVE-2021-41773 and CVE-2021-42013 as co-remediation requirements.
**Rollback Risk:**
- Upgrading `apache2` may reload virtual host configurations; any syntax errors in existing configs will prevent the service from restarting. Run `apache2ctl configtest` before and after patching.
- Custom modules compiled against 2.4.49 or 2.4.50 may be incompatible with 2.4.51+. Identify third-party modules (`apache2ctl -M`) before patching.
- To revert: pin the previous package version with `apt-mark hold apache2` and reinstall the prior version from package cache if available, or restore from a pre-patch system snapshot. Document the pre-patch version with `apache2 -v` before executing the playbook.
- If CGI is enabled (`mod_cgi`, `mod_cgid`), consider disabling it as an interim control if patching cannot be immediately applied.

