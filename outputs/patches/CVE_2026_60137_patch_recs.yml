## Ansible Remediation Playbook

---
- name: "Remediate CVE-2026-60137 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-60137"
    affected_package: "wordpress"
    # Fixed versions per branch: 6.8.6 / 6.9.5 / 7.0.2
    # The apt module will install the latest available package version.
    # ANALYST: Confirm your distro's wordpress package reflects the fixed
    # upstream version before running. See caveat in Patch Recommendation.

  pre_tasks:
    - name: "Check if wordpress package is managed by apt"
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Status}' wordpress
      register: dpkg_check
      failed_when: false
      changed_when: false

    - name: "Abort if wordpress is not apt-managed"
      ansible.builtin.fail:
        msg: >
          CVE-2026-60137 REMEDIATION HALTED on {{ inventory_hostname }}:
          The 'wordpress' package is not managed by apt on this host
          (dpkg status: '{{ dpkg_check.stdout }}'). Manual remediation
          required — use WP-CLI or your deployment pipeline to upgrade
          WordPress core to 6.8.6, 6.9.5, or 7.0.2 as appropriate.
          See advisory: https://patchstack.com/database/wordpress/plugin/wordpress/vulnerability/wordpress-core-7-0-2-unauthenticated-sql-injection-vulnerability
      when: "'install ok installed' not in dpkg_check.stdout"

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Record pre-patch WordPress package version"
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Version}' wordpress
      register: pre_patch_version
      changed_when: false

    - name: "Log pre-patch version"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} — Pre-patch wordpress package version on
          {{ inventory_hostname }}: {{ pre_patch_version.stdout }}

    - name: "Upgrade wordpress package to latest available via apt"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result

    - name: "Record post-patch WordPress package version"
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Version}' wordpress
      register: post_patch_version
      changed_when: false

    - name: "Restart Apache2 web server if package was upgraded"
      ansible.builtin.service:
        name: "apache2"
        state: restarted
      when: patch_result.changed
      # ANALYST: Replace 'apache2' with 'nginx' or your applicable
      # web server / PHP-FPM service name if different.

    - name: "Restart PHP-FPM if applicable and package was upgraded"
      ansible.builtin.service:
        name: "php-fpm"
        state: restarted
      when: patch_result.changed
      failed_when: false
      # failed_when: false because PHP-FPM may not be present on all hosts.
      # ANALYST: Replace with versioned service name e.g. php8.2-fpm if needed.

    - name: "Audit log — patch outcome"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation completed on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Pre-patch version: {{ pre_patch_version.stdout }}.
          Post-patch version: {{ post_patch_version.stdout }}.

    - name: "Write audit record to local log file"
      ansible.builtin.lineinfile:
        path: "/var/log/cve_remediation.log"
        line: >-
          {{ ansible_date_time.iso8601 }} | {{ cve_id }} |
          host={{ inventory_hostname }} |
          changed={{ patch_result.changed }} |
          pre={{ pre_patch_version.stdout }} |
          post={{ post_patch_version.stdout }}
        create: true
        mode: '0640'

