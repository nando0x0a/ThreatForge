## Patch Recommendation

> **⚠️ DRAFT FOR ANALYST REVIEW** — This playbook and recommendation are proposed drafts. Validate all version targets, package names, and service identifiers against your environment before execution.

**CVE:** CVE-2026-60137

**Affected Product:** WordPress Core — versions 6.8.x < 6.8.6, 6.9.x < 6.9.5, and 7.0.x < 7.0.2 [3][4]

**Fixed Version:** 6.8.6, 6.9.5, or 7.0.2 (apply the fixed version corresponding to your current release branch) [3][4]

**Urgency:** **IMMEDIATE** — This vulnerability is listed in the CISA Known Exploited Vulnerabilities Catalog as actively exploited in the wild [2], has at least 19 public proof-of-concept exploits available [6][7], and is confirmed as unauthenticated and network-exploitable (AV:N/PR:N/UI:N) with RCE potential. Despite a CVSS score of 5.9 (MEDIUM) [1], the KEV status, RCE classification, and PoC availability elevate operational priority to CRITICAL.

> **⚠️ SEVERITY DISCREPANCY NOTE FOR ANALYST REVIEW:** The CVSS base score is recorded as **5.9 (MEDIUM)** [1][5], yet the vulnerability is classified as actively exploited with unauthenticated RCE (AV:N/PR:N/UI:N). This is an unusual combination — a MEDIUM CVSS score paired with no-auth, no-interaction network RCE. Analysts should independently verify whether the CVSS vector string fully reflects the unauthenticated exploitation path described in the advisory [3][4], as the base score may underrepresent actual risk. The KEV listing [2] and 19 public PoCs [6][7] should be weighted heavily in your prioritization decision regardless of the CVSS score.

**Rollback Risk:**
- WordPress core updates may introduce template or theme compatibility breaks, particularly for sites using older or unmaintained themes that hook into `WP_Query` directly.
- Plugin compatibility issues are possible; plugins that pass unsanitized values to the `author__not_in` parameter may behave differently after the sanitization fix is applied [3][4].
- **Revert method:** Restore from a pre-patch filesystem and database snapshot. If using a managed host or WP-CLI, `wp core download --version=<previous> --force` can downgrade core files, but this is not recommended beyond emergency rollback. Always snapshot before patching.
- **Note:** The `apt` module approach below applies only to environments where WordPress is managed as a system package (e.g., Debian/Ubuntu `wordpress` package). Most production WordPress installations are not managed this way — see the important caveat below.

---

> **⚠️ IMPORTANT — PACKAGE MANAGEMENT CAVEAT FOR ANALYST REVIEW:** WordPress is most commonly deployed by downloading from wordpress.org directly, not via `apt`. The Debian/Ubuntu `wordpress` apt package is frequently out of date and may not track upstream versions 6.8.x/6.9.x/7.0.x. If your WordPress installations are **not** managed via `apt`, this playbook **will not apply the fix**. In that case, use WP-CLI (`wp core update --version=<fixed>`) or your deployment pipeline. The playbook below is valid only for apt-managed installs and includes a guard task to detect this.

