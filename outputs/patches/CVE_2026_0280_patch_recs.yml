## Validation Steps

> All steps below assume the correct PAN-OS fixed version has been confirmed via [2] prior to execution.

1. **Verify PAN-OS software version post-upgrade:**
   - Log in to the PAN-OS management interface or via SSH.
   - Run: `show system info | match sw-version`
   - Confirm the installed version matches or exceeds the fixed version specified in [2].

2. **Confirm IPv6 dataplane policy processing is intact:**
   - Review active security policies for IPv6 address families.
   - Send test IPv6 traffic (from a controlled, authorized source) against a policy-controlled destination and confirm expected allow/deny behavior is enforced correctly.
   - If a pre-patch packet capture baseline was taken, compare post-patch behavior.

3. **Check system logs for errors post-upgrade:**
   - Review `system` and `traffic` logs in the PAN-OS web UI or via CLI: `show log system`
   - Confirm no dataplane restart errors or IPv6 processing faults.

4. **Verify no regression on existing firewall rules:**
   - Confirm existing IPv4 and IPv6 security policies evaluate as expected using `test security-policy-match` CLI commands.

5. **Record patch evidence:**
   - Export system info output (`show system info`) and store with change ticket referencing CVE-2026-0280 for audit trail.

6. **Severity discrepancy follow-up:**
   - Given the conflict between NVD CVSS 7.2 [1] and CNA CVSS v4.0 1.7 [3], confirm with Palo Alto Networks PSIRT or monitor [2] for advisory updates that may revise severity or add exploit maturity details.

