## Ansible Remediation Playbook

> **NOTE:** `jupyterlab-git` is a Python package typically installed via `pip`, not an `apt`-managed system package. The playbook below uses the `ansible.builtin.pip` module, which is the correct remediation vector for this package. An `apt`-based variant is included as a commented stub for environments where jupyterlab-git is distributed as a system `.deb` package (uncommon). Analyst should confirm the installation method in their environment before executing.

---
- name: "Remediate CVE-2026-54528 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-54528"
    affected_package: "jupyterlab-git"
    fixed_version: "0.54.0"
    # Set pip_executable to the pip binary associated with the target JupyterLab environment.
    # Override at runtime if using a virtualenv: -e pip_executable=/path/to/venv/bin/pip
    pip_executable: "pip3"

  pre_tasks:
    - name: "Record pre-patch version of {{ affected_package }}"
      ansible.builtin.command:
        cmd: "{{ pip_executable }} show {{ affected_package }}"
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Log pre-patch version"
      ansible.builtin.debug:
        msg: "Pre-patch state: {{ pre_patch_version.stdout | default('Package not found or pip unavailable') }}"

  tasks:
    # --- pip-based remediation (primary path) ---
    - name: "Upgrade {{ affected_package }} to >= {{ fixed_version }} via pip"
      ansible.builtin.pip:
        name: "{{ affected_package }}>={{ fixed_version }}"
        executable: "{{ pip_executable }}"
        state: present
      register: pip_patch_result

    # --- apt-based stub (uncomment if package is managed via apt in your environment) ---
    # - name: Update apt cache
    #   ansible.builtin.apt:
    #     update_cache: true
    #     cache_valid_time: 3600
    #
    # - name: "Upgrade {{ affected_package }} via apt"
    #   ansible.builtin.apt:
    #     name: "python3-jupyterlab-git"
    #     state: latest
    #   register: apt_patch_result

    - name: "Restart JupyterLab service if package was upgraded"
      ansible.builtin.service:
        name: "jupyterlab"
        state: restarted
      # Adjust the service name to match your deployment (e.g., jupyter, jupyterhub).
      # If JupyterLab is not managed as a systemd service, comment out this task
      # and perform a manual restart.
      when: pip_patch_result.changed
      failed_when: false
      register: service_restart_result

    - name: "Warn if service restart was skipped or failed"
      ansible.builtin.debug:
        msg: >
          WARNING: JupyterLab service restart was skipped or could not be completed automatically.
          Manual restart may be required for the patch to take effect.
      when: >
        not pip_patch_result.changed or
        (service_restart_result is defined and service_restart_result.failed | default(false))

    - name: "Record post-patch version of {{ affected_package }}"
      ansible.builtin.command:
        cmd: "{{ pip_executable }} show {{ affected_package }}"
      register: post_patch_version
      changed_when: false

    - name: "Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation attempted on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Pre-patch: {{ pre_patch_version.stdout_lines[1] | default('unknown') }}.
          Post-patch: {{ post_patch_version.stdout_lines[1] | default('unknown') }}.

  post_tasks:
    - name: "Assert fixed version is installed"
      ansible.builtin.assert:
        that:
          - "fixed_version in post_patch_version.stdout"
        fail_msg: >
          ASSERTION FAILED: {{ affected_package }} >= {{ fixed_version }} does not appear
          to be installed on {{ inventory_hostname }}. Manual investigation required.
        success_msg: >
          ASSERTION PASSED: {{ affected_package }} {{ fixed_version }} confirmed
          on {{ inventory_hostname }}.

