## Validation Steps

> **DRAFT — Analyst should verify these steps are appropriate for their environment.**

**1. Confirm installed package version (manual):**
pip show jupyterlab-git
# Expected: Version: 0.54.0 or higher [3]

**2. Confirm via Python import (manual):**
python3 -c "import jupyterlab_git; print(jupyterlab_git.__version__)"
# Expected output: 0.54.0 or higher

**3. Verify the patched commit is present (optional, source installs only):**
Check that commit `460035275b5963dc96e364e60ba6a73717fbd033` [2] is included in the installed package by inspecting the changelog or source, if applicable.

**4. Functional check — confirm `excluded_paths` enforcement:**
- As an authenticated user, attempt to access a path that should be excluded by the `excluded_paths` configuration in `GitHandler.prepare()`.
- Confirm the path is correctly blocked after patching.
- This test is specifically relevant on **case-insensitive filesystems** (macOS, certain Linux mounts), where the pre-patch `fnmatch.fnmatchcase()` behaviour was exploitable [1][4].

**5. Check Ansible assertion output:**
The `Assert fixed version is installed` post-task will fail the play if the version string is not present in `pip show` output, providing automated confirmation.

**6. Review JupyterLab service status:**
systemctl status jupyterlab
# or whichever service name applies in your environment

