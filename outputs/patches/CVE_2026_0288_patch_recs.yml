- name: "Remediate CVE-2026-0288 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-0288"
    affected_package: "panos-user-id-agent"  # REQUIRES ANALYST ADAPTATION
    # Replace with vendor-confirmed fixed version from [2]:
    # https://security.paloaltonetworks.com/CVE-2026-0288
    fixed_version: "CONFIRM-WITH-VENDOR-ADVISORY"  # REQUIRES ANALYST ADAPTATION

  tasks:

    - name: "Pre-check | Assert fixed_version has been set by analyst"
      ansible.builtin.assert:
        that:
          - fixed_version != "CONFIRM-WITH-VENDOR-ADVISORY"
        fail_msg: >
          STOP: fixed_version has not been set. Consult the Palo Alto Networks
          Security Advisory for CVE-2026-0288 at
          https://security.paloaltonetworks.com/CVE-2026-0288 and set the
          fixed_version variable before running this playbook.
        success_msg: "fixed_version is set to {{ fixed_version }}. Proceeding."

    - name: "Pre-remediation | Take configuration snapshot or backup"
      # REQUIRES ANALYST ADAPTATION:
      # For PAN-OS appliances, trigger a config export via XML API or
      # Panorama before proceeding. Example placeholder below.
      ansible.builtin.debug:
        msg: >
          ANALYST ACTION REQUIRED: Ensure a configuration backup and
          PAN-OS snapshot have been taken for {{ inventory_hostname }}
          before applying the patch for {{ cve_id }}.

    - name: "Update apt cache (scaffold only — adapt for PAN-OS)"
      # REQUIRES ANALYST ADAPTATION: Replace with PAN-OS upgrade mechanism.
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      # Remove or replace this task for PAN-OS targets.

    - name: "Upgrade affected package (scaffold only — adapt for PAN-OS)"
      # REQUIRES ANALYST ADAPTATION:
      # For PAN-OS: use the paloaltonetworks.panos.panos_software module,
      # or issue an XML API software upgrade call.
      # For Windows Terminal Server Agent: use ansible.windows.win_package
      # or ansible.windows.win_shell to invoke the MSI installer.
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result
      # Remove or replace this task for PAN-OS targets.

    - name: "Restart User-ID service if package was upgraded"
      # REQUIRES ANALYST ADAPTATION:
      # Service name on Windows Terminal Server Agent hosts may differ.
      # On PAN-OS appliances, a system restart or commit may be required.
      ansible.builtin.service:
        name: "PanGpHip"  # REQUIRES ANALYST ADAPTATION — confirm service name
        state: restarted
      when: patch_result.changed

    - name: "Post-patch | Verify installed version"
      # REQUIRES ANALYST ADAPTATION:
      # Query the installed PAN-OS or agent version and assert it matches
      # the fixed_version variable.
      ansible.builtin.debug:
        msg: >
          ANALYST ACTION REQUIRED: Verify that {{ inventory_hostname }}
          is now running the fixed version ({{ fixed_version }}) for {{ cve_id }}.

    - name: "Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} patch attempt completed on {{ inventory_hostname }}
          at {{ ansible_date_time.
