**CVE:** CVE-2026-0288

**Affected Product:** Palo Alto Networks PAN-OS — User-ID Terminal Server Agent component [2]. Specific affected PAN-OS version ranges are not fully enumerated in the provided advisory context [2]. Verify the complete affected version matrix at the vendor advisory [2] before deploying remediation.

**Fixed Version:** Not explicitly stated in the provided advisory context [2]. Consult the Palo Alto Networks Security Advisory directly [2] to obtain the specific fixed PAN-OS version(s) prior to patching.

**Urgency:** **Immediate (within 24 hours).** This vulnerability is rated HIGH severity (CVSS 7.2 per the vendor advisory [2]; see severity note below), is 5 days old, permits unauthenticated remote code execution over the network (AV:N/PR:N/UI:N) [1], and carries a Priority Tier of HIGH PRIORITY with an RCE tag. No public PoC is currently known, but the network-exploitable RCE attack vector warrants treating this as urgent.

> ⚠️ **SEVERITY DISCREPANCY BETWEEN SOURCES:** The NVD record [1] reports a CVSS score of **7.5 (HIGH)**, while the Palo Alto Networks vendor advisory [2] reports a CVSS score of **7.2 (HIGH)**. Both fall within the HIGH band, but analysts should review both records [1][2] to determine which score applies to their environment and scoring methodology before communicating risk posture.

**Rollback Risk:**
- PAN-OS upgrades on Palo Alto Networks firewalls and appliances carry moderate rollback complexity. Downgrading PAN-OS may require restoring a saved configuration snapshot and can involve service disruption.
- The User-ID Terminal Server Agent is a Windows-based component deployed on domain controllers or terminal servers [2]. Upgrading or rolling back the agent may briefly interrupt user-to-IP mapping, affecting identity-based policy enforcement.
- **Mitigation if patching is delayed:** Consider restricting network access to the User-ID Terminal Server Agent port at the perimeter or host firewall as a temporary compensating control until the patch is applied. Consult vendor advisory [2] for any officially documented workarounds.
- Ensure a full configuration backup and a PAN-OS snapshot are taken and validated before initiating any upgrade.

