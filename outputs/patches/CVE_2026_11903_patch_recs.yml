## Validation Steps

> Confirm the patch was applied successfully using the following checks. All steps are manual or read-only.

1. **Verify installed version:**
   - On the MOVEit Transfer host, navigate to the application's **About** page or admin console and confirm the displayed version matches one of the fixed releases: **2026.0.1**, **2025.1.4**, or **2025.0.8** [2].
   - On Linux (if using a package): `dpkg -l | grep moveit-transfer` or `rpm -qa | grep moveit` depending on distro.

2. **Check service health:**
   - Confirm the MOVEit Transfer service is running and accepting connections post-restart.
   - Review application logs for startup errors: typically located under the MOVEit Transfer installation directory (path specific to your deployment).

3. **Functional smoke test:**
   - Log in to the MOVEit Transfer web interface and navigate to the **Ad Hoc module** [1][2] — this is the component affected by the stored XSS. Confirm it loads without errors.

4. **XSS payload test (analyst-approved only):**
   - If your organisation has an approved testing procedure, submit a benign XSS test payload (e.g., `<script>alert(1)</script>`) into an Ad Hoc transfer field in a non-production environment and confirm it is neutralised/escaped in the rendered output, not executed. Do not perform this on production without change control approval.

5. **Review Ansible audit output:**
   - Confirm `patch_result.changed` was `true` in the play output, indicating the package was actually upgraded (not already at the target version with no action taken).

6. **Cross-reference advisory:**
   - Re-check the Progress Customer Community bulletin [2] for any post-patch known issues or re-issued patches before closing the remediation ticket.

