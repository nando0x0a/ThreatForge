## Ansible Remediation Playbook

> **⚠️ IMPORTANT — ANALYST REVIEW REQUIRED BEFORE USE:**
> Progress MOVEit Transfer is not distributed as a Linux apt package [2]. The `apt` module below uses a placeholder package name. This playbook must be replaced or extended with the appropriate mechanism for your environment (e.g., `ansible.builtin.win_package` for Windows MSI, a `shell` task invoking the vendor upgrade script, or a container image pull). The structure is provided for review and adaptation only.

---
- name: "Remediate CVE-2026-11903 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-11903"
    affected_package: "moveit-transfer"
    # ANALYST NOTE: 'moveit-transfer' is a placeholder. Progress MOVEit Transfer
    # is not available via apt. Replace this variable and the upgrade task with
    # the appropriate installer or package manager for your deployment.
    # Reference fixed versions: 2026.0.1 / 2025.1.4 / 2025.0.8 [2]

  tasks:
    - name: "{{ cve_id }} | Pre-flight — assert target OS is Debian-based"
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >
          This playbook uses the apt module and targets Debian/Ubuntu hosts.
          MOVEit Transfer is typically Windows-based. Analyst must verify
          deployment platform before running this playbook.
        success_msg: "OS family check passed: {{ ansible_os_family }}"

    - name: "{{ cve_id }} | Pre-patch snapshot reminder"
      ansible.builtin.debug:
        msg: >
          REMINDER: Ensure a system snapshot or MOVEit Transfer database backup
          has been taken before proceeding. Rollback will require restoring from
          this backup if the upgrade causes issues.

    - name: "{{ cve_id }} | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "{{ cve_id }} | Upgrade affected package to fixed version"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
        # ANALYST NOTE: If a specific fixed version must be pinned (recommended),
        # replace 'state: latest' with:
        #   name: "{{ affected_package }}=<fixed_version>"
        #   state: present
        # and set 'allow_downgrade: false'
      register: patch_result

    - name: "{{ cve_id }} | Restart MOVEit Transfer service if package was upgraded"
      ansible.builtin.service:
        name: "moveit-transfer"
        # ANALYST NOTE: Replace with the actual service name as registered
        # on your system (e.g., 'MOVEit Transfer' on Windows via win_service).
        state: restarted
      when: patch_result.changed

    - name: "{{ cve_id }} | Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} patch task executed on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Analyst must validate version post-patch per validation steps.

