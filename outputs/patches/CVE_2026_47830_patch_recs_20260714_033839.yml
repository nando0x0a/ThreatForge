        fail_msg: "One or more PLACEHOLDER values remain. Playbook execution halted."
        success_msg: "Package variables confirmed. Proceeding with remediation."

    - name: Record pre-patch package version
      ansible.builtin.command:
        cmd: "dpkg-query -W -f='${Version}' {{ affected_package }}"
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: Log pre-patch state
      ansible.builtin.debug:
        msg: >
          Host: {{ inventory_hostname }} |
          CVE: {{ cve_id }} |
          Package: {{ affected_package }} |
          Pre-patch version: {{ pre_patch_version.stdout | default('not installed') }}

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade affected package to fixed version
      ansible.builtin.apt:
        name: "{{ affected_package }}={{ fixed_version }}"
        state: present
        allow_downgrade: false
      register: patch_result

    - name: Restart service if package was upgraded
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      when: patch_result.changed

    - name: Record post-patch package version
      ansible.builtin.command:
        cmd: "dpkg-query -W -f='${Version}' {{ affected_package }}"
      register: post_patch_version
      changed_when: false
      failed_when: false

    - name: Audit log
      ansible.builtin.debug:
        msg: >
          CVE: {{ cve_id }} |
          Host: {{ inventory_hostname }} |
          Package: {{ affected_package }} |
          Pre-patch: {{ pre_patch_version.stdout | default('unknown') }} |
          Post-patch: {{ post_patch_version.stdout | default('unknown') }} |
          Changed: {{ patch_result.changed }} |
          Timestamp: {{ ansible_date_time.iso8601 }}

    - name: Write audit record to local log file
      ansible.builtin.lineinfile:
        path: "/var/log/cve_remediation.log"
        line: >
          {{ ansible_date_time.iso8601 }} | {{ cve_id }} | {{ inventory_hostname }} |
          {{ affected_package }} | {{ pre_patch_version.stdout | default('unknown') }}
          -> {{ post_patch_version.stdout | default('unknown') }} | changed={{ patch_result.changed }}
        create: true
        mode: '0640'

  post_tasks:
    - name: Verify service is running after patch
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: started
      when: patch_result.changed
      register: service_check

    - name: Flag if service failed to start
      ansible.builtin.fail:
