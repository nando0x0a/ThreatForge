## Patch Recommendation

> **ANALYST REVIEW REQUIRED — This is a proposed draft for analyst review prior to deployment.**

**CVE:** CVE-2026-61459
**Affected Product:** MCP Server Kubernetes (mcp-server-kubernetes) — versions < 3.9.0 [1]
**Fixed Version:** 3.9.0 [2]
**Urgency:** Immediate — within 24 hours. CVSS 9.8 CRITICAL [1], network-exploitable with no privileges required and no user interaction, 2 days old, bearer token leakage and full cluster compromise confirmed in scope [3][4].
**Rollback Risk:**
- Downgrading to a pre-3.9.0 version restores the vulnerability. Do not roll back unless a critical regression is confirmed.
- The fix modifies argument validation logic in structured tools [2]; any custom tooling or automation that relied on undocumented flag passthrough behaviour may break after upgrade — audit kubectl wrapper integrations before and after patching.
- If running as a containerised workload, redeployment of the container image is required; a simple package upgrade may not apply if the image is pinned.
- Revert path: redeploy prior pinned image tag, but accept the security risk and isolate the workload from the network immediately if rollback is necessary.

> **⚠ NOTE — APT MODULE APPLICABILITY:** MCP Server Kubernetes is a Node.js/npm package, not a Debian/Ubuntu apt-managed system package. The Ansible playbook below uses the `npm` module for the canonical remediation path. An apt-based stub is also included for environments that have repackaged this as a system package, but analysts should verify their deployment method and adapt accordingly. If deployed as a container, the correct remediation is to update the container image tag to 3.9.0 and redeploy — not an in-place package upgrade.

