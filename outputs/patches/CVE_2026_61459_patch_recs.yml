## Ansible Remediation Playbook

---
# ANALYST REVIEW REQUIRED — Proposed draft. Verify deployment method before running.
# CVE-2026-61459 | MCP Server Kubernetes < 3.9.0 | Argument injection / token leakage
# Reference: https://nvd.nist.gov/vuln/detail/CVE-2026-61459
# Fix commit: https://github.com/Flux159/mcp-server-kubernetes/commit/d7890f50a4567bf5d9842541ba6f41e180227f9a

- name: "Remediate CVE-2026-61459 — MCP Server Kubernetes upgrade on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-61459"
    affected_package: "mcp-server-kubernetes"
    fixed_version: "3.9.0"
    npm_global_install: true          # Set false if installed locally per-project
    service_name: "mcp-server-kubernetes"   # Adjust to match actual systemd unit name in your environment

  tasks:

    # -----------------------------------------------------------------------
    # BLOCK A: npm-managed installations (canonical upstream delivery method)
    # -----------------------------------------------------------------------
    - name: "Check if npm is available"
      ansible.builtin.command: which npm
      register: npm_check
      failed_when: false
      changed_when: false

    - name: "Upgrade {{ affected_package }} via npm (global) — {{ cve_id }}"
      community.general.npm:
        name: "{{ affected_package }}"
        version: "{{ fixed_version }}"
        global: "{{ npm_global_install }}"
        state: present
      register: npm_patch_result
      when: npm_check.rc == 0

    - name: "Verify installed version meets fixed version — {{ cve_id }}"
      ansible.builtin.command: >
        npm list -g --depth=0 {{ affected_package }}
      register: npm_version_check
      changed_when: false
      when: npm_check.rc == 0

    - name: "Assert fixed version is installed"
      ansible.builtin.assert:
        that:
          - "fixed_version in npm_version_check.stdout"
        fail_msg: >
          FAIL: {{ affected_package }} does not appear to be at {{ fixed_version }}.
          Manual review required. CVE: {{ cve_id }}
        success_msg: >
          PASS: {{ affected_package }} {{ fixed_version }} confirmed installed.
      when: npm_check.rc == 0

    # -----------------------------------------------------------------------
    # BLOCK B: apt-managed installations (for environments that repackage
    # mcp-server-kubernetes as a Debian/Ubuntu system package)
    # NOTE: Skip this block if your environment uses npm or containers only.
    # -----------------------------------------------------------------------
    - name: "Update apt cache (apt-managed environments only)"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: npm_check.rc != 0

    - name: "Upgrade affected package via apt — {{ cve_id }}"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: apt_patch_result
      when: npm_check.rc != 0

    # -----------------------------------------------------------------------
    # BLOCK C: Service restart (applies to both paths if a systemd unit exists)
    # -----------------------------------------------------------------------
    - name: "Check if systemd service unit exists"
      ansible.builtin.stat:
        path: "/etc/systemd/system/{{ service_name }}.service"
      register: service_unit_stat

    - name: "Restart service if package was upgraded (npm path)"
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      when:
        - service_unit_stat.stat.exists
        - npm_check.rc == 0
        - npm_patch_result.changed | default(false)

    - name: "Restart service if package was upgraded (apt path)"
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      when:
        - service_unit_stat.stat.exists
        - npm_check.rc != 0
        - apt_patch_result.changed | default(false)

    # -----------------------------------------------------------------------
    # BLOCK D: Rotate bearer tokens — CRITICAL for this CVE
    # Token leakage is a confirmed impact vector [1][3]. Rotation is mandatory
    # if any exposure window existed.
    # -----------------------------------------------------------------------
    - name: "Analyst action required — bearer token rotation reminder"
      ansible.builtin.debug:
        msg: >
          ACTION REQUIRED ({{ cve_id }}): If mcp-server-kubernetes was exposed
          to untrusted input prior to patching, rotate all Kubernetes bearer tokens
          and service account credentials that were accessible to the MCP server process.
          Review kubectl config and KUBECONFIG for exposed credentials.
          Ref: https://github.com/Flux159/mcp-server-kubernetes/issues/328

    # -----------------------------------------------------------------------
    # BLOCK E: Audit log
    # -----------------------------------------------------------------------
    - name: "Audit log — {{ cve_id }}"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation task completed on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          npm_changed={{ npm_patch_result.changed | default('N/A') }}
          apt_changed={{ apt_patch_result.changed | default('N/A') }}
          Analyst must verify version and token rotation independently.

