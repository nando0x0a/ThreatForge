## Patch Recommendation

> **DRAFT FOR ANALYST REVIEW** — Verify all version strings, package names, and service identifiers against your environment before executing.

**CVE:** CVE-2026-61459
**Affected Product:** MCP Server Kubernetes (`mcp-server-kubernetes`) — all versions < 3.9.0 [1][4]
**Fixed Version:** 3.9.0 (patch committed at [2])
**Urgency:** **Immediate (within 24 hours)** — CVSS 9.8 CRITICAL [1], network-exploitable with no privileges or user interaction required (AV:N/PR:N/UI:N), resulting in bearer token leakage and potential full cluster compromise.
**Rollback Risk:**
- Rolling back to < 3.9.0 re-exposes the argument injection vulnerability [3].
- The fix modifies flag-validation logic in structured tools; any custom tooling or automation that relied on behaviour of `assertNoDangerousFlags` or passed `--server` as a legitimate override will need re-testing after upgrade.
- To revert: pin the package to the previous known-good version via npm (`npm install mcp-server-kubernetes@<previous-version>`) or via your container image tag, then file a risk-acceptance ticket pending a permanent fix review.

> ⚠️ **IMPORTANT NOTE ON PLAYBOOK SCOPE:** MCP Server Kubernetes is a **Node.js/npm package**, not a native Debian/apt package [2][3]. The apt-based playbook template below has been adapted to invoke `npm` for remediation, since no apt package exists for this software. Analyst must confirm the actual installation method (npm global, npx, Docker image, etc.) in their environment and adjust accordingly. If deployed as a container, the remediation path is an image rebuild/redeploy, not a package manager upgrade.

