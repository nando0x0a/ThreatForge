## Validation Steps

1. **Confirm installed version post-patch:**
   ```bash
   npm list -g --depth=0 mcp-server-kubernetes
   
   Expected output must include `mcp-server-kubernetes@3.9.0` or higher [2].

2. **Inspect the `assertNoDangerousFlags` implementation in the installed package** to confirm the `--server` flag bypass is blocked:
   ```bash
   grep -r "assertNoDangerousFlags\|--server" \
     $(npm root -g)/mcp-server-kubernetes/
   
   The patched version should reject `--server` as a dangerous flag [3].

3. **Test argument injection rejection (without offensive tools):**
   Confirm that passing `resourceType` or `name` parameters with leading dashes (e.g., `--server=<value>`) is rejected by the tool validation layer and does not result in a kubectl invocation against an arbitrary API server endpoint.

4. **Verify bearer token scope:**
   Audit Kubernetes API server access logs for any unexpected token use against non-cluster endpoints that may indicate pre-patch exploitation activity [3].

5. **Confirm service is running post-restart:**
   ```bash
   systemctl status mcp-server-kubernetes
   

6. **Container/image deployments:** If MCP Server Kubernetes runs as a container, confirm the image tag references `>= 3.9.0` and redeploy:
   ```bash
   kubectl rollout restart deployment/<your-mcp-deployment> -n <namespace>
   kubectl rollout status deployment/<your-mcp-deployment> -n <namespace>
   

