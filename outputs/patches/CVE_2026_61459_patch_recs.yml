## Ansible Remediation Playbook

---
# DRAFT FOR ANALYST REVIEW
# CVE-2026-61459 — MCP Server Kubernetes argument injection
# Affected: mcp-server-kubernetes < 3.9.0
# Fixed in: 3.9.0 (ref: github.com/Flux159/mcp-server-kubernetes commit d7890f50)
# Source [1]: https://nvd.nist.gov/vuln/detail/CVE-2026-61459
# Source [2]: https://github.com/Flux159/mcp-server-kubernetes/commit/d7890f50a4567bf5d9842541ba6f41e180227f9a
#
# WARNING: This playbook uses npm, NOT apt, because mcp-server-kubernetes
# is a Node.js package. Adjust the target group, node path, and service
# restart logic to match your deployment before running.

- name: "Remediate CVE-2026-61459 — mcp-server-kubernetes on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-61459"
    affected_package: "mcp-server-kubernetes"
    fixed_version: "3.9.0"
    npm_bin: "/usr/bin/npm"        # Override if npm is installed elsewhere
    service_name: "mcp-server-kubernetes"  # Override with your actual systemd unit name

  tasks:

    - name: "{{ cve_id }} — Verify npm is available"
      ansible.builtin.command:
        cmd: "{{ npm_bin }} --version"
      register: npm_version_check
      changed_when: false
      failed_when: npm_version_check.rc != 0

    - name: "{{ cve_id }} — Capture installed version before patch"
      ansible.builtin.command:
        cmd: "{{ npm_bin }} list -g --depth=0 {{ affected_package }}"
      register: pre_patch_version
      changed_when: false
      failed_when: false  # Non-zero is acceptable if package not found globally

    - name: "{{ cve_id }} — Log pre-patch version"
      ansible.builtin.debug:
        msg: "Pre-patch state: {{ pre_patch_version.stdout | default('Package not found or not installed globally') }}"

    - name: "{{ cve_id }} — Upgrade mcp-server-kubernetes to fixed version via npm"
      ansible.builtin.command:
        cmd: "{{ npm_bin }} install -g {{ affected_package }}@{{ fixed_version }}"
      register: patch_result
      changed_when: "'updated' in patch_result.stdout or 'added' in patch_result.stdout"
      notify: Restart mcp-server-kubernetes service

    - name: "{{ cve_id }} — Capture installed version after patch"
      ansible.builtin.command:
        cmd: "{{ npm_bin }} list -g --depth=0 {{ affected_package }}"
      register: post_patch_version
      changed_when: false

    - name: "{{ cve_id }} — Assert fixed version is installed"
      ansible.builtin.assert:
        that:
          - fixed_version in post_patch_version.stdout
        fail_msg: >
          REMEDIATION FAILED: {{ affected_package }} does not appear to be at
          version {{ fixed_version }} after upgrade. Manual investigation required.
        success_msg: >
          REMEDIATION CONFIRMED: {{ affected_package }}@{{ fixed_version }} is installed.

    - name: "{{ cve_id }} — Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation completed on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Pre-patch: {{ pre_patch_version.stdout | default('unknown') }}.
          Post-patch: {{ post_patch_version.stdout }}.

  handlers:
    - name: Restart mcp-server-kubernetes service
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      register: service_restart_result
      failed_when: false  # Soft-fail: service may not be managed by systemd in all deployments
      notify_on: always

