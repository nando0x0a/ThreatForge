## Ansible Remediation Playbook

> **DRAFT FOR ANALYST REVIEW** — Validate `affected_package`, `fixed_version`, and service name against your environment before execution. No fixed version could be confirmed from available sources; the playbook upgrades to the latest available patched version via APT.

---
- name: "Remediate CVE-2026-10037 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-10037"
    affected_package: "openjdk-25-jdk"
    # NOTE: If a pinned fixed version is confirmed via Ubuntu Security Notice,
    # replace 'state: latest' below with 'name: "{{ affected_package }}={{ fixed_version }}"'
    # and define fixed_version here, e.g.: fixed_version: "25~xx+xx-0ubuntu1"
    mitigation_package: "mailcap"

  tasks:
    - name: "{{ cve_id }} | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "{{ cve_id }} | Record pre-patch package version for rollback audit"
      ansible.builtin.command:
        cmd: "dpkg-query -W -f='${Version}' {{ affected_package }}"
      register: pre_patch_version
      changed_when: false
      failed_when: pre_patch_version.rc not in [0, 1]

    - name: "{{ cve_id }} | Log pre-patch version"
      ansible.builtin.debug:
        msg: >
          Host: {{ inventory_hostname }} |
          Pre-patch version of {{ affected_package }}: {{ pre_patch_version.stdout | default('not installed') }}

    - name: "{{ cve_id }} | Upgrade affected OpenJDK package"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result

    - name: "{{ cve_id }} | Check if mailcap is installed (attack surface reduction)"
      ansible.builtin.command:
        cmd: "dpkg-query -W -f='${Status}' mailcap"
      register: mailcap_status
      changed_when: false
      failed_when: false

    - name: "{{ cve_id }} | Warn if mailcap is present (increases exploit surface)"
      ansible.builtin.debug:
        msg: >
          WARNING: 'mailcap' is installed on {{ inventory_hostname }}.
          Per CVE-2026-10037 advisory, this package is required for exploitation [2].
          Consider removing it if not operationally required: 'apt-get remove mailcap'.
      when: "'install ok installed' in mailcap_status.stdout"

    - name: "{{ cve_id }} | Check if xdg-desktop-portal-gtk is installed (attack surface)"
      ansible.builtin.command:
        cmd: "dpkg-query -W -f='${Status}' xdg-desktop-portal-gtk"
      register: xdg_portal_status
      changed_when: false
      failed_when: false

    - name: "{{ cve_id }} | Warn if xdg-desktop-portal-gtk is present"
      ansible.builtin.debug:
        msg: >
          WARNING: 'xdg-desktop-portal-gtk' is installed on {{ inventory_hostname }}.
          Per CVE-2026-10037 advisory, OpenURI portal access via this package is
          required for exploitation [2]. Verify this is operationally necessary.
      when: "'install ok installed' in xdg_portal_status.stdout"

    - name: "{{ cve_id }} | Restart Java-dependent service if package was upgraded"
      ansible.builtin.service:
        # ANALYST ACTION REQUIRED: Replace 'YOUR_JAVA_SERVICE_NAME' with the
        # actual service name in your environment (e.g., tomcat9, jenkins, elasticsearch).
        # If no persistent Java service is running, this task can be disabled.
        name: "YOUR_JAVA_SERVICE_NAME"
        state: restarted
      when:
        - patch_result.changed
        - false  # REMOVE THIS LINE after confirming correct service name above

    - name: "{{ cve_id }} | Record post-patch package version"
      ansible.builtin.command:
        cmd: "dpkg-query -W -f='${Version}' {{ affected_package }}"
      register: post_patch_version
      changed_when: false
      failed_when: post_patch_version.rc not in [0, 1]

    - name: "{{ cve_id }} | Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation on {{ inventory_hostname }} at {{ ansible_date_time.iso8601 }} |
          Package: {{ affected_package }} |
          Pre-patch: {{ pre_patch_version.stdout | default('not installed') }} |
          Post-patch: {{ post_patch_version.stdout | default('unknown') }} |
          Changed: {{ patch_result.changed }}

