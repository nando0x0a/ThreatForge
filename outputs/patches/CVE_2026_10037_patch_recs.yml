## Patch Recommendation

> **DRAFT FOR ANALYST REVIEW** — All details below should be verified against official Ubuntu Security Notices (USN) before deployment. Fixed version information was not available in the provided sources at time of generation; see note below.

**CVE:** CVE-2026-10037

**Affected Product:** OpenJDK packages in Ubuntu (specifically `openjdk-25` and potentially other OpenJDK variants) where `mailcap` is installed and `xdg-desktop-portal-gtk` is accessible [2]. The vulnerability arises from `.jar` MIME handler configuration allowing `.jar` files marked as executable to be invoked outside the application sandbox [2].

**Fixed Version:** ⚠️ A specific fixed package version was **not available** in the provided sources [1][2][3]. Analysts must confirm the patched version by checking:
- `ubuntu-security-notices` (https://ubuntu.com/security/notices)
- `apt-cache policy openjdk-25` after `apt-get update` on an affected host
- The Launchpad bug tracker [2] for patch landed/fix released status

**Urgency:** Within 7 days (STANDARD priority tier, Priority Score: 50). The CVSS score is 8.8 HIGH [1], but exploit requires a non-trivial precondition chain: the attacker must have access to a sandboxed application, `mailcap` must be installed, and the OpenURI portal must be reachable via `xdg-desktop-portal-gtk` [2]. No public proof-of-concept is known. Escalate to within 24h if your environment uses Firefox Snap with Java content handling enabled.

**Rollback Risk:**
- Upgrading OpenJDK may break applications pinned to a specific JDK minor version or ABI-sensitive JNI native libraries.
- Java-based services (e.g., Tomcat, Elasticsearch, Jenkins) will require restart and should be validated post-upgrade.
- To revert: `apt-get install openjdk-25-jdk=<previous_version>` using the version recorded in the audit log, or restore from a pre-patch snapshot if running on a VM.
- **Mitigating action (if patching is delayed):** Remove or restrict the `mailcap` package (`apt-get remove mailcap`) or restrict access to `xdg-desktop-portal-gtk` to reduce attack surface [2].

