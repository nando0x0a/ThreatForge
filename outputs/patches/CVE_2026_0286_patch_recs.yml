## Ansible Remediation Playbook

> ⚠️ **IMPORTANT NOTICE FOR ANALYST:** PAN-OS runs on a proprietary Palo Alto Networks operating system and is **not managed via `apt`**. The standard remediation path is through the PAN-OS web UI, CLI (`request system software`), or Panorama — not a Linux package manager. The playbook below uses the `paloaltonetworks.panos` Ansible collection (`panos_op` and related modules) as the appropriate mechanism. **If your environment uses a different orchestration approach, adapt accordingly. Confirm the target fixed version from [2] before running.**

---
# DRAFT FOR ANALYST REVIEW
# CVE: CVE-2026-0286
# Source: https://security.paloaltonetworks.com/CVE-2026-0286
# NOTE: PAN-OS is NOT an apt-managed system. This playbook uses the
#       paloaltonetworks.panos Ansible collection. Install it first:
#         ansible-galaxy collection install paloaltonetworks.panos
# NOTE: Target fixed version must be confirmed from [2] before deployment.
# Replace 'ANALYST_CONFIRM_VERSION' with the actual fixed PAN-OS version.

- name: "Remediate CVE-2026-0286 - PAN-OS Authenticated Command Injection"
  hosts: "{{ target_group }}"
  gather_facts: false
  vars:
    cve_id: "CVE-2026-0286"
    target_version: "ANALYST_CONFIRM_VERSION"  # e.g. "11.1.3" — confirm from advisory [2]
    provider:
      ip_address: "{{ ansible_host }}"
      username: "{{ panos_username }}"
      password: "{{ panos_password }}"

  tasks:

    - name: "Assert target version has been set by analyst"
      ansible.builtin.assert:
        that:
          - target_version != "ANALYST_CONFIRM_VERSION"
        fail_msg: >
          STOP: target_version must be set to a confirmed fixed PAN-OS version
          from https://security.paloaltonetworks.com/CVE-2026-0286 before running
          this playbook. Do not run with placeholder value.
        success_msg: "Target version is set to {{ target_version }}. Proceeding."

    - name: "Check current PAN-OS version"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "show system info"
      register: system_info

    - name: "Display current system info"
      ansible.builtin.debug:
        msg: "Current system info retrieved. Analyst should verify version before proceeding."

    - name: "Download target PAN-OS version"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "request system software download version {{ target_version }}"
      register: download_result

    - name: "Wait for download to complete (poll)"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "show jobs all"
      register: jobs_result
      until: >
        'FIN' in (jobs_result.stdout | default(''))
      retries: 30
      delay: 60

    - name: "Install target PAN-OS version"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "request system software install version {{ target_version }}"
      register: install_result

    - name: "Reboot device to complete upgrade"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "request restart system"
      ignore_errors: true  # Device will drop connection on reboot

    - name: "Wait for device to come back online"
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 443
        delay: 120
        timeout: 600
        state: started

    - name: "Verify upgraded PAN-OS version"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "show system info"
      register: post_upgrade_info

    - name: "Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation playbook executed on {{ inventory_hostname }}
          targeting version {{ target_version }} at {{ ansible_date_time.iso8601 }}.
          DRAFT — analyst must verify output of 'show system info' to confirm upgrade success.

