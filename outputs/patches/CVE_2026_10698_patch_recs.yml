## Patch Recommendation

> **DRAFT FOR ANALYST REVIEW** — Verify all version strings, package names, and service identifiers against your environment before executing.

**CVE:** CVE-2026-10698

**Affected Product:** Progress MOVEit Transfer [1][2]
- 2025.0.0 through 2025.0.7 (before 2025.0.8) [1]
- 2025.1.0 through 2025.1.3 (before 2025.1.4) [1]
- 2026.0.0 (before 2026.0.1) [1]

**Fixed Version:** [2]
- 2025.0.8 (for 2025.0.x branch)
- 2025.1.4 (for 2025.1.x branch)
- 2026.0.1 (for 2026.0.x branch)

**Urgency:** Within 7 days — Priority Tier STANDARD with CVSS 7.2 HIGH [1]; no public PoC known and no CISA KEV listing observed in provided context. Reassess urgency immediately if PoC or active exploitation evidence emerges.

> ⚠️ **Note:** MOVEit Transfer is a Windows-based application distributed by Progress Software as an installer package, **not** a Linux apt-managed package [2]. The Ansible playbook below uses the `apt` module as required by the template, but **this will not function as written for MOVEit Transfer**. A realistic remediation would use `win_package`, `win_shell`, or Progress's own upgrade procedures. The playbook is provided as a structural draft only — analyst/engineer must adapt it to the actual deployment platform before use.

**Rollback Risk:**
- MOVEit Transfer upgrades modify the database schema for the Custom Reports module; rolling back may require a pre-upgrade database snapshot restore [2].
- Existing Custom Reports configurations could be affected if schema migrations are not reversible.
- Recommended pre-patch actions: full database backup, filesystem snapshot of `C:\MOVEitTransfer\` (or equivalent install path), and validation of current version state via the MOVEit Transfer admin console.
- Revert path: restore from snapshot and re-apply previous installer from Progress Customer Community portal [2].

