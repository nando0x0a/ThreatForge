## Validation Steps

1. **Pre-patch version capture:**
   - Log into the MOVEit Transfer web admin console and record the current build/version string from the System page before patching [2].

2. **Post-patch version verification:**
   - Log back into the admin console after the upgrade completes.
   - Confirm the installed version matches one of the fixed versions: 2025.0.8, 2025.1.4, or 2026.0.1 [1][2].

3. **Custom Reports module check:**
   - Navigate to the Custom Reports module and confirm it loads without error — the SQL injection vulnerability resides there [1][3].
   - Attempt a benign report query to verify normal functionality is preserved.

4. **Service health check:**
   - Confirm the MOVEit Transfer service is running and accepting connections on its standard ports (typically 443/HTTPS and 22/SFTP).
   - Review `C:\MOVEitTransfer\Logs\` (or equivalent log path) for errors post-restart.

5. **Database integrity check:**
   - If a DBA is available, confirm no unexpected schema changes or errors appear in the MOVEit Transfer database logs following the upgrade.

6. **NVD/advisory cross-check:**
   - Re-query NVD [1] and the Progress Customer Community bulletin [2] post-patch to confirm no additional patches or guidance have been issued in the 6-day window since this CVE was published.

