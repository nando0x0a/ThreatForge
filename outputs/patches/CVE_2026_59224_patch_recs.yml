## Ansible Remediation Playbook

> **NOTE FOR ANALYST:** Open WebUI is **not** distributed as a native OS apt package. The playbook below targets a pip-based installation (the most common deployment method). If your environment uses Docker, Kubernetes, or another deployment method, this playbook must be replaced or substantially modified. Verify your deployment method before execution.

---
- name: "Remediate CVE-2026-59224 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-59224"
    affected_package: "open-webui"
    fixed_version: "0.10.0"
    # ANALYST: Set this to the path of the Python/pip environment used for Open WebUI
    pip_executable: "/usr/local/bin/pip3"
    # ANALYST: Set this to the virtualenv path if applicable, or omit the virtualenv key below
    open_webui_virtualenv: ""
    # ANALYST: Set the systemd service name for Open WebUI in your environment
    open_webui_service: "open-webui"

  tasks:
    - name: "DRAFT - CVE-2026-59224 - Record pre-patch Open WebUI version"
      ansible.builtin.command:
        cmd: "{{ pip_executable }} show open-webui"
      register: pre_patch_version
      changed_when: false
      ignore_errors: true

    - name: "DRAFT - CVE-2026-59224 - Log pre-patch version"
      ansible.builtin.debug:
        msg: "Pre-patch state on {{ inventory_hostname }}: {{ pre_patch_version.stdout | default('open-webui not found via pip') }}"

    - name: "DRAFT - CVE-2026-59224 - Update apt cache (for any OS-level dependencies)"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "DRAFT - CVE-2026-59224 - Upgrade open-webui via pip to fixed version (>= 0.10.0)"
      ansible.builtin.pip:
        name: "open-webui>={{ fixed_version }}"
        executable: "{{ pip_executable }}"
        virtualenv: "{{ open_webui_virtualenv | default(omit) }}"
        state: present
      register: patch_result

    - name: "DRAFT - CVE-2026-59224 - Restart Open WebUI service if package was upgraded"
      ansible.builtin.service:
        name: "{{ open_webui_service }}"
        state: restarted
      when: patch_result.changed

    - name: "DRAFT - CVE-2026-59224 - Record post-patch Open WebUI version"
      ansible.builtin.command:
        cmd: "{{ pip_executable }} show open-webui"
      register: post_patch_version
      changed_when: false
      ignore_errors: true

    - name: "DRAFT - CVE-2026-59224 - Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation attempted on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Post-patch state: {{ post_patch_version.stdout | default('Could not determine version') }}

