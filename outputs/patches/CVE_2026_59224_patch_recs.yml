## Validation Steps

1. **Confirm installed version is 0.10.0 or later:**
   ```bash
   pip show open-webui | grep Version
   # Expected: Version: 0.10.0 (or higher)
   

2. **Verify the fix commit is present (if building from source):**
   Check that commit `5f3a628a8d291bb5d33e1a0b0c89fb62a2927934` [3] is included in the deployed code:
   ```bash
   git -C /path/to/open-webui log --oneline | grep 5f3a628
   

3. **Confirm service is running post-patch:**
   ```bash
   systemctl status open-webui
   # Expected: active (running)
   

4. **Functional smoke test:** Log in as a non-admin user and confirm that terminal backend requests cannot be manipulated to impersonate another user by inspecting the `X-User-Id` header handling. Consult the advisory [2] for specific reproduction conditions once fully public.

5. **Review application logs** for any unexpected errors introduced by the upgrade:
   ```bash
   journalctl -u open-webui -n 100 --no-pager
   

6. **Cross-reference against advisory:** Confirm remediation guidance aligns with the published advisory [2] and fix commit [3] after full advisory disclosure.

