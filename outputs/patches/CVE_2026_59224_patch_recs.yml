## Patch Recommendation

> **DRAFT FOR ANALYST REVIEW** — Verify all details against your environment before executing.

**CVE:** CVE-2026-59224

**Affected Product:** Open WebUI, all versions prior to 0.10.0 [1][4]

**Fixed Version:** Open WebUI 0.10.0 [2]

**Vulnerability Summary:** CVE-2026-59224 is a broken access control vulnerability (CVSS 8.0 HIGH) [1] in Open WebUI's terminal backend. The `session_id` is transmitted unencoded and the `X-User-Id` header is forwarded without adequate validation, allowing an attacker to craft requests that impersonate other authenticated users [4]. The fix is referenced in commit `5f3a628a8d291bb5d33e1a0b0c89fb62a2927934` [3].

**Urgency:** Within 7 days (Priority Tier: MONITOR). No public proof-of-concept is currently known, which reduces immediate exploitation risk. However, the CVSS 8.0 HIGH score [1] and the nature of the access control bypass — allowing user impersonation in a terminal context — warrant prompt remediation. Re-evaluate urgency immediately if a PoC becomes public.

> ⚠️ **SEVERITY NOTE:** The provided CVSS score is 8.0 HIGH [1]. No discrepancy between sources was flagged in the supplied context; however, analysts should independently verify the score against [1] and [4] as this CVE is only 4 days old and scores may be subject to revision.

**Rollback Risk:**
- Open WebUI 0.10.0 may introduce breaking changes to configuration files, model integrations, or API endpoints compared to pre-0.10.0 releases. Review the Open WebUI changelog before upgrading.
- If Open WebUI is deployed via Docker or pip rather than an OS package manager, the Ansible apt playbook below **must be adapted** — see notes in the playbook.
- Rollback path: retain the current container image tag or pip package version prior to upgrade; document the running version with `pip show open-webui` or `docker inspect` before patching.
- Database migrations introduced in 0.10.0 (if any) may not be reversible. Take a full database backup before applying the patch.

