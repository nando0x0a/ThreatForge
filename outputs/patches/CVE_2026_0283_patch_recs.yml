# Target PAN-OS fixed version must be confirmed from vendor advisory [2] before use.

- name: "Remediate CVE-2026-0283 — PAN-OS LSVPN Auth Bypass on {{ target_group }}"
  hosts: "{{ target_group }}"
  gather_facts: false

  vars:
    cve_id: "CVE-2026-0283"
    affected_product: "Palo Alto Networks PAN-OS (LSVPN)"
    # REQUIRED: Set target_version to the vendor-confirmed fixed version from [2]
    # DO NOT populate this value without consulting the advisory at [2]
    target_version: "UNSET — confirm from https://security.paloaltonetworks.com/CVE-2026-0283"
    # REQUIRED: Provide API key via vault or extra-vars — never hardcode
    panos_api_key: "{{ vault_panos_api_key }}"
    panos_mgmt_host: "{{ inventory_hostname }}"
    panos_api_base: "https://{{ panos_mgmt_host }}/api"
    validate_certs: true   # Set to false only in lab environments — never in production

  tasks:

    - name: "Pre-flight — Abort if target_version is not set"
      ansible.builtin.fail:
        msg: >
          target_version is not set. You must confirm the fixed PAN-OS version
          from the vendor advisory at https://security.paloaltonetworks.com/CVE-2026-0283
          before running this playbook. Aborting.
      when: target_version | regex_search('^UNSET')

    - name: "Pre-flight — Retrieve current PAN-OS version via XML API"
      ansible.builtin.uri:
        url: "{{ panos_api_base }}/?type=version&key={{ panos_api_key }}"
        method: GET
        validate_certs: "{{ validate_certs }}"
        return_content: true
      register: current_version_response
      no_log: true   # Suppress API key from logs

    - name: "Pre-flight — Display current version response (sanitised)"
      ansible.builtin.debug:
        msg: "Current version API response received. Analyst should verify version string manually before proceeding."

    - name: "Initiate PAN-OS software download for fixed version"
      ansible.builtin.uri:
        url: "{{ panos_api_base }}/?type=op&cmd=<request><system><software><download><version>{{ target_version }}</version></download></software></system></request>&key={{ panos_api_key }}"
        method: GET
        validate_certs: "{{ validate_certs }}"
        return_content: true
        timeout: 60
      register: download_result
      no_log: true
      # NOTE: Download is asynchronous on PAN-OS. A production-grade playbook should
      # poll job status via the jobs API before proceeding to install.

    - name: "Pause — Allow software download to complete (adjust delay as needed)"
      ansible.builtin.pause:
        minutes: 10
        prompt: >
          Waiting for PAN-OS software download to complete on {{ inventory_hostname }}.
          Monitor download progress in the device UI (Device > Software) before continuing.
          Press ENTER to proceed to install, or Ctrl+C to abort.

    - name: "Initiate PAN-OS software install for fixed version"
      ansible.builtin.uri:
        url: "{{ panos_api_base }}/?type=op&cmd=<request><system><software><install><version>{{ target_version }}</version></install></software></system></request>&key={{ panos_api_key }}"
        method: GET
        validate_certs: "{{ validate_certs }}"
        return_content: true
        timeout: 60
      register: install_result
      no_log: true

    - name: "Pause — Allow software install to complete before reboot"
