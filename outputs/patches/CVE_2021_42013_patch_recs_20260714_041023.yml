## Ansible Remediation Playbook

> **DRAFT FOR ANALYST REVIEW** — This playbook is a proposed remediation draft. Validate against your environment's package manager, Apache version, and service name before execution. Service name may differ (e.g., `httpd` on RHEL-family systems — this playbook targets Debian/Ubuntu apt-managed systems).

---
- name: "Remediate CVE-2021-42013 — Apache HTTP Server Path Traversal/RCE on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2021-42013"
    affected_package: "apache2"
    minimum_safe_version: "2.4.51"
    service_name: "apache2"

  tasks:
    - name: "{{ cve_id }} | Collect pre-patch Apache version"
      ansible.builtin.command:
        cmd: apache2 -v
      register: apache_version_pre
      changed_when: false
      failed_when: false

    - name: "{{ cve_id }} | Log pre-patch version"
      ansible.builtin.debug:
        msg: "Pre-patch Apache version on {{ inventory_hostname }}: {{ apache_version_pre.stdout | default('apache2 not found or not in PATH') }}"

    - name: "{{ cve_id }} | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "{{ cve_id }} | Upgrade Apache HTTP Server package to remediate path traversal/RCE"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result

    - name: "{{ cve_id }} | Verify installed version meets minimum safe version"
      ansible.builtin.command:
        cmd: apache2 -v
      register: apache_version_post
      changed_when: false
      failed_when: false

    - name: "{{ cve_id }} | Assert minimum safe version is installed"
      ansible.builtin.assert:
        that:
          - apache_version_post.stdout is defined
          - apache_version_post.stdout != ''
        fail_msg: >
          REMEDIATION VERIFICATION FAILED on {{ inventory_hostname }}:
          Unable to determine Apache version post-patch.
          Manual review required for {{ cve_id }}.
        success_msg: >
          Apache version post-patch on {{ inventory_hostname }}:
          {{ apache_version_post.stdout }}. Confirm >= 2.4.51 manually.

    - name: "{{ cve_id }} | Disable mod_cgi if present (hardening — CGI enables RCE path)"
      ansible.builtin.command:
        cmd: a2dismod cgi cgid
      register: cgi_disable_result
      changed_when: "'already disabled' not in cgi_disable_result.stderr"
      failed_when: false
      notify: Restart Apache

    - name: "{{ cve_id }} | Restart Apache if package was upgraded"
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      when: patch_result.changed

    - name: "{{ cve_id }} | Confirm Apache service is running post-patch"
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: started
        enabled: true

    - name: "{{ cve_id }} | Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation applied on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Post-patch version: {{ apache_version_post.stdout | default('unknown') }}.
          DRAFT — Analyst must verify version >= 2.4.51 and confirm CGI modules
          are disabled unless operationally required.

  handlers:
    - name: Restart Apache
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted

