## Validation Steps

**1. Confirm installed Apache version:**
apache2 -v
# Expected output must show version >= 2.4.51
# Example: Server version: Apache/2.4.51 (Ubuntu)

**2. Confirm package version via apt:**
apt-cache policy apache2
# Installed: version should be >= 2.4.51

**3. Verify CGI modules are disabled (hardening validation):**
apache2ctl -M | grep -E 'cgi'
# Expected: no output (cgi_module and cgid_module should NOT appear)

**4. Test path traversal is no longer exploitable (safe probe — no exploit code):**
# Analyst should use an internal vulnerability scanner (e.g., Tenable, Qualys, Nuclei
