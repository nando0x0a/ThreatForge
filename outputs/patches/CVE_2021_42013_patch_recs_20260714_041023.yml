## Patch Recommendation

**CVE:** CVE-2021-42013
**Affected Product:** Apache HTTP Server 2.4.49 and 2.4.50 (CVE-2021-42013 specifically affects 2.4.50, which was an incomplete fix for CVE-2021-41773 in 2.4.49; both versions are vulnerable)
**Fixed Version:** Apache HTTP Server 2.4.51 or later
**Urgency:** IMMEDIATE — patch within 24 hours. This vulnerability is confirmed actively exploited in the wild (CISA KEV), carries a CVSS 9.8 CRITICAL score, and enables unauthenticated remote code execution via path traversal. Priority Tier is CRITICAL — ACT NOW.
**Rollback Risk:**
- Downgrading Apache may reintroduce CVE-2021-41773 and related vulnerabilities; do not roll back below 2.4.51.
- Apache configuration directives or module compatibility may differ between minor versions; test in staging before production deployment.
- If CGI modules (mod_cgi, mod_cgid) are enabled, verify they are disabled post-patch unless explicitly required — this is a hardening step independent of the patch.
- Revert procedure: snapshot or image the host prior to patching; retain the prior package version in a local apt cache or use `apt-get install apache2=<prior_version>` only as a last resort while accepting known RCE exposure.
- Service restart will briefly interrupt HTTP/HTTPS availability; schedule within a maintenance window or ensure load balancer health checks can absorb the restart.

