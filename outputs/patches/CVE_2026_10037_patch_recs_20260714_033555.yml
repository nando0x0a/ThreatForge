- name: "Remediate CVE-2026-10037 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-10037"
    affected_package: "PLACEHOLDER_PACKAGE"  # ANALYST ACTION REQUIRED: replace with confirmed package name
    service_name: "PLACEHOLDER_SERVICE"       # ANALYST ACTION REQUIRED: replace with confirmed service name

  pre_tasks:
    - name: "Abort if package name has not been confirmed"
      ansible.builtin.fail:
        msg: >
          CVE-2026-10037 remediation aborted. The affected_package variable
          is still set to 'PLACEHOLDER_PACKAGE'. Update this value with the
          confirmed package name from the vendor advisory before proceeding.
      when: affected_package == "PLACEHOLDER_PACKAGE"

    - name: "Abort if service name has not been confirmed"
      ansible.builtin.fail:
        msg: >
          CVE-2026-10037 remediation aborted. The service_name variable
          is still set to 'PLACEHOLDER_SERVICE'. Update this value with the
          confirmed service name before proceeding.
      when: service_name == "PLACEHOLDER_SERVICE"

    - name: "Record pre-patch package version for audit"
      ansible.builtin.command:
        cmd: "dpkg-query -W -f='${Version}' {{ affected_package }}"
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Log pre-patch version"
      ansible.builtin.debug:
        msg: >
          CVE-2026-10037 | Host: {{ inventory_hostname }} |
          Pre-patch version of {{ affected_package }}: {{ pre_patch_version.stdout | default('not installed or unknown') }}

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Upgrade affected package to latest available version"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result

    - name: "Record post-patch package version for audit"
      ansible.builtin.command:
        cmd: "dpkg-query -W -f='${Version}' {{ affected_package }}"
      register: post_patch_version
      changed_when: false
      failed_when: false

    - name: "Restart service if package was upgraded"
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      when: patch_result.changed

    - name: "Verify service is running after restart"
      ansible.builtin.service_facts:
      when: patch_result.changed

    - name: "Assert service is in running state"
      ansible.builtin.assert:
        that:
          - "ansible_facts.services[service_name + '.service'] is defined"
          - "ansible_facts.services[service_name + '.service'].state == 'running'"
        fail_msg: >
          WARNING: {{ service_name }} is not running after patch for CVE-2026-10037.
          Manual intervention may be required on {{ inventory_hostname }}.
        success_msg: "{{ service_name }} is running normally after patch."
      when: patch_result.changed

    - name: "Audit log — patch outcome"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} | Host: {{ inventory_hostname }} |
          Package: {{ affected_package }} |
          Pre-patch version: {{ pre_patch_version.stdout | default('unknown') }} |
          Post-patch version: {{ post_patch_version.stdout | default('unknown') }} |
          Package changed: {{ patch_result.changed }} |
          Timestamp: {{ ansible_date_time.iso8601 }}

  post_tasks:
    - name: "Write audit record to local log"
      ansible.builtin.lineinfile:
        path: "/var/log/cve_remediation.log"
        line: >
          {{ ansible_date_time.iso8601 }} | {{ cve_id }} | {{ inventory_hostname }} |
          {{ affected_package }} | pre={{ pre_patch_version.stdout | default('unknown') }} |
          post={{ post_patch_version.stdout | default('unknown') }} |
          changed={{ patch_result.changed }}
        create: true
        mode: '0640'

