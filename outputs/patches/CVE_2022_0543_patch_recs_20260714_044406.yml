## Patch Recommendation

**CVE:** CVE-2022-0543
**Affected Product:** Redis (Debian/Ubuntu packaged distributions only — this vulnerability is Debian-specific due to a packaging flaw in how the Lua library is exposed; upstream Redis is not affected). Affected Debian/Ubuntu packages: `redis`, `redis-server`, `redis-tools` on Debian Buster, Bullseye, and Ubuntu 20.04 LTS / 21.10 and earlier affected builds.
**Fixed Version:** Debian Bullseye: `5:6.0.16-1+deb11u2` or later. Ubuntu 20.04 LTS: `5:6.0.16-1ubuntu1` or later. Confirm exact fixed version via `apt-cache policy redis-server` against your distribution's patched repository. Check DSA-5083-1 (Debian) and USN-5294-1 (Ubuntu) for authoritative fixed version strings.
**Urgency:** IMMEDIATE — CISA KEV confirmed active exploitation; CVSS 10.0 Critical; Priority Tier CRITICAL — ACT NOW. Patching must be completed within 24 hours of identification.
**Rollback Risk:**
- Redis service will be restarted, causing brief connection interruption. Any in-flight non-persistent operations (non-AOF/RDB) may be lost.
- Clients relying on Lua scripting behaviour tied to the vulnerable sandbox exposure (unlikely in legitimate workloads) may behave differently post-patch.
- To revert: pin the previous package version via `apt-mark hold redis-server` before patching, or reinstall with `apt install redis-server=<previous_version>`. Snapshot the host or Redis data directory (`/var/lib/redis`) before proceeding if rollback fidelity is required.
- Persistent data (RDB/AOF) is not affected by the package upgrade itself.

