## Ansible Remediation Playbook

**⚠️ DRAFT FOR ANALYST REVIEW — Do not deploy without change control approval and testing in a non-production environment first.**

---
- name: "Remediate CVE-2022-0543 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2022-0543"
    affected_package: "redis-server"
    related_packages:
      - redis-server
      - redis-tools
      - redis
    service_name: "redis-server"
    pre_patch_snapshot_dir: "/var/backups/redis_prepatch"

  tasks:
    - name: "{{ cve_id }} | Assert Debian/Ubuntu family only"
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >
          CVE-2022-0543 remediation playbook targets Debian/Ubuntu only.
          This host ({{ inventory_hostname }}) reports OS family
          '{{ ansible_os_family }}'. Aborting.
        success_msg: "OS family check passed: {{ ansible_os_family }}"

    - name: "{{ cve_id }} | Record pre-patch Redis package version"
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Package} ${Version}\n' redis-server redis-tools redis
      register: pre_patch_versions
      changed_when: false
      failed_when: false

    - name: "{{ cve_id }} | Log pre-patch versions"
      ansible.builtin.debug:
        msg: "Pre-patch versions on {{ inventory_hostname }}: {{ pre_patch_versions.stdout_lines }}"

    - name: "{{ cve_id }} | Create pre-patch snapshot directory"
      ansible.builtin.file:
        path: "{{ pre_patch_snapshot_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: "{{ cve_id }} | Save pre-patch version record to disk"
      ansible.builtin.copy:
        content: |
          CVE: {{ cve_id }}
          Host: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          Pre-patch versions:
          {{ pre_patch_versions.stdout }}
        dest: "{{ pre_patch_snapshot_dir }}/pre_patch_versions_{{ ansible_date_time.epoch }}.txt"
        owner: root
        group: root
        mode: "0600"

    - name: "{{ cve_id }} | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: "{{ cve_id }} | Upgrade all Redis-related packages"
      ansible.builtin.apt:
        name: "{{ related_packages }}"
        state: latest
        only_upgrade: true
      register: patch_result

    - name: "{{ cve_id }} | Record post-patch Redis package version"
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Package} ${Version}\n' redis-server redis-tools redis
      register: post_patch_versions
      changed_when: false
      failed_when: false

    - name: "{{ cve_id }} | Log post-patch versions"
      ansible.builtin.debug:
        msg: "Post-patch versions on {{ inventory_hostname }}: {{ post_patch_versions.stdout_lines }}"

    - name: "{{ cve_id }} | Restart Redis service if package was upgraded"
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      when: patch_result.changed

    - name: "{{ cve_id }} | Verify Redis service is running post-restart"
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: started
      register: service_state

    - name: "{{ cve_id }} | Confirm Redis is accepting connections"
      ansible.builtin.command:
        cmd: redis-cli ping
      register: redis_ping
      changed_when: false
      failed_when: redis_ping.stdout != "PONG"
      retries: 3
      delay: 5

    - name: "{{ cve_id }} | Save post-patch version record to disk"
      ansible.builtin.copy:
        content: |
          CVE: {{ cve_id }}
          Host: {{ inventory_hostname }}
          Timestamp: {{ ansible_date_time.iso8601 }}
          Post-patch versions:
          {{ post_patch_versions.stdout }}
          Package changed: {{ patch_result.changed }}
          Redis ping: {{ redis_ping.stdout }}
        dest: "{{ pre_patch_snapshot_dir }}/post_patch_versions_{{ ansible_date_time.epoch }}.txt"
        owner: root
        group: root
        mode: "0600"

    - name: "{{ cve_id }} | Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation complete on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Redis response: {{ redis_ping.stdout }}.
          Post-patch: {{ post_patch_versions.stdout_lines }}.

