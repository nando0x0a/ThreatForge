## Validation Steps

> **DRAFT — Analyst should adapt version string checks to match the fixed package version available in their distribution's repository.**

1. **Confirm OpenSSH binary version** on the target host:
   ```bash
   ssh -V
   # Expected output should reference OpenSSH_10.4p1 or later [2]
   

2. **Confirm package version via dpkg:**
   ```bash
   dpkg -l | grep -E 'openssh-server|openssh-client'
   # Verify the installed version reflects a package containing OpenSSH 10.4p1 [2][3]
   

3. **Verify sshd is running and responsive:**
   ```bash
   systemctl status ssh
   ss -tlnp | grep ':22'
   

4. **Validate sshd configuration is clean (no deprecated directives introduced by upgrade):**
   ```bash
   sshd -t && echo "Config OK"
   

5. **Test SSH connectivity** from a control node before closing out-of-band access:
   ```bash
   ssh -o ConnectTimeout=5 <target_host> echo "SSH OK"
   

6. **Review audit log** on each target:
   ```bash
   grep CVE-2026-60002 /var/log/cve_remediation.log
   

7. **Confirm no active sessions were unintentionally terminated** by reviewing `/var/log/auth.log` for unexpected disconnections around the time of the service restart.

