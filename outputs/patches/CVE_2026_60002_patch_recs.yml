## Ansible Remediation Playbook

> **DRAFT — For analyst review and testing in a non-production environment before deployment.**

---
- name: "Remediate CVE-2026-60002 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-60002"
    affected_package:
      - openssh-server
      - openssh-client

  pre_tasks:
    - name: "Pre-patch: Record installed OpenSSH version"
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Package} ${Version}\n' openssh-server openssh-client
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Pre-patch: Log pre-patch version"
      ansible.builtin.debug:
        msg: "Pre-patch OpenSSH version on {{ inventory_hostname }}: {{ pre_patch_version.stdout }}"

    - name: "Pre-patch: Validate sshd configuration before upgrade"
      ansible.builtin.command:
        cmd: sshd -t
      register: sshd_config_check
      changed_when: false
      failed_when: sshd_config_check.rc != 0

  tasks:
    - name: "{{ cve_id }} — Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "{{ cve_id }} — Upgrade openssh-server and openssh-client"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
        only_upgrade: true
      register: patch_result

    - name: "{{ cve_id }} — Validate sshd configuration after upgrade"
      ansible.builtin.command:
        cmd: sshd -t
      register: sshd_config_post_check
      changed_when: false
      failed_when: sshd_config_post_check.rc != 0
      when: patch_result.changed

    - name: "{{ cve_id }} — Restart sshd if package was upgraded and config is valid"
      ansible.builtin.service:
        name: ssh
        state: restarted
      when:
        - patch_result.changed
        - sshd_config_post_check.rc is defined
        - sshd_config_post_check.rc == 0

    - name: "Post-patch: Record installed OpenSSH version"
      ansible.builtin.command:
        cmd: dpkg-query -W -f='${Package} ${Version}\n' openssh-server openssh-client
      register: post_patch_version
      changed_when: false
      failed_when: false

    - name: "Audit log — {{ cve_id }}"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation run on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Pre-patch: {{ pre_patch_version.stdout | default('unknown') }}.
          Post-patch: {{ post_patch_version.stdout | default('unknown') }}.

    - name: "Audit log — Write to file"
      ansible.builtin.lineinfile:
        path: /var/log/cve_remediation.log
        line: >-
          {{ ansible_date_time.iso8601 }} | {{ cve_id }} |
          {{ inventory_hostname }} | changed={{ patch_result.changed }} |
          pre={{ pre_patch_version.stdout | default('unknown') | replace('\n',' ') }} |
          post={{ post_patch_version.stdout | default('unknown') | replace('\n',' ') }}
        create: true
        mode: '0640'

