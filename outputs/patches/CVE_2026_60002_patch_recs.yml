## Patch Recommendation

> **DRAFT — For analyst review before operational use.**

**CVE:** CVE-2026-60002
**Affected Product:** OpenSSH versions prior to 10.4 / 10.4p1 (all platforms running affected openssh-server or openssh-client packages)
**Fixed Version:** OpenSSH 10.4 / 10.4p1, released 2026-07-06 [2][3]
**Urgency:** **Immediate (within 24 hours)** — Priority Tier: CRITICAL. This vulnerability is network-exploitable (AV:N/PR:N/UI:N) with confirmed RCE potential [1], rated CVSS 7.7 HIGH [1], and is only 6 days old with no public PoC currently known. The absence of a PoC does not reduce urgency given the RCE classification and wide exposure of SSH services.

> ⚠️ **SEVERITY NOTE:** The provided CVSS score of 7.7 (HIGH) [1] should be reviewed by the analyst in the context of the AV:N/PR:N/UI:N vector string, which some scoring interpretations place at a higher effective risk than the base score alone reflects. Analysts should verify whether the CNA-published record [4] and NVD [1] are in agreement on the final score before finalising risk acceptance decisions.

**Rollback Risk:**
- Upgrading OpenSSH may restart the SSH daemon, potentially terminating active sessions. Ensure out-of-band console access (IPMI/iDRAC/KVM) or a secondary access method is available before patching.
- Configuration file changes between versions (e.g., deprecated directives) may cause `sshd` to fail on restart if `/etc/ssh/sshd_config` contains options removed or renamed in 10.4p1 [2]. Run `sshd -t` to validate config before service restart.
- To revert: pin the previous package version using `apt-mark hold openssh-server` prior to upgrade, or reinstall the prior version from a local mirror/snapshot. Document the pre-patch version with `dpkg -l | grep openssh` before proceeding.
- On systems with SELinux/AppArmor profiles scoped to a specific OpenSSH binary hash, the profile may require updating after upgrade.

