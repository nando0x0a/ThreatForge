## Patch Recommendation

> **DRAFT FOR ANALYST REVIEW** — Verify package names, versions, and service identifiers against your distribution's repositories before deployment.

**CVE:** CVE-2026-60002
**Affected Product:** OpenSSH versions prior to 10.4 / 10.4p1 [2][3]
**Fixed Version:** OpenSSH 10.4 / 10.4p1 (released 2026-07-06) [2][3]
**Urgency:** **Immediate** — Priority Tier is CRITICAL (score 90) [1][4], vulnerability is network-exploitable with no authentication or user interaction required (AV:N/PR:N/UI:N), and carries confirmed RCE potential. At 5 days old this is an actively relevant window. Treat as a same-shift remediation action.
**CVSS Score:** 7.7 HIGH [1]

> ⚠️ **SEVERITY NOTE:** Only a single CVSS score (7.7 HIGH) is present in the provided sources [1]. No discrepancy between sources was identified for this CVE. If your internal tooling or a downstream feed surfaces a different score, reconcile before finalising risk acceptance.

**Rollback Risk:**
- OpenSSH is the primary remote management channel on most Linux systems. A failed upgrade or misconfigured service restart could terminate SSH connectivity to the host, locking out remote access.
- **Mitigation before patching:** Ensure out-of-band access (console, IPMI, cloud serial console) is available before applying.
- **Revert procedure:** Pin the previously installed `openssh-server` / `openssh-client` version via `apt-mark hold openssh-server openssh-client`, then reinstall the pinned version with `apt install openssh-server=<previous-version>`. Re-enable the service with `systemctl restart sshd`.
- The use-after-free is triggered client-side when a server changes its host key during re-exchange [1][3]. Environments where `sshd` is configured with static, non-rotating host keys have a reduced (but not eliminated) exposure window — do not use this as justification to delay patching.
- Package name on Debian/Ubuntu distributions is typically `openssh-server`; verify the exact package name and available patched version in your distribution's repository before running the playbook. Upstream 10.4p1 may not be immediately available in all distro package feeds — check your vendor's security advisories separately.

