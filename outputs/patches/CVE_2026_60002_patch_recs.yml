# DRAFT FOR ANALYST REVIEW
# CVE: CVE-2026-60002
# Remediates use-after-free in OpenSSH < 10.4 (host key change during re-exchange)
# Fixed version: openssh-server >= 10.4p1 (2026-07-06)
# References:
#   [1] https://nvd.nist.gov/vuln/detail/CVE-2026-60002
#   [2] https://www.openssh.org/releasenotes.html#10.4p1
#   [3] https://www.openwall.com/lists/oss-security/2026/07/06/5
#   [4] https://www.cve.org/CVERecord?id=CVE-2026-60002
#
# PREREQUISITES:
#   - Out-of-band / console access confirmed before execution
#   - Verify openssh-server package name and patched version in your distro repo
#   - Run with --check --diff first (see Dry Run Command section)

- name: "Remediate CVE-2026-60002 — OpenSSH use-after-free on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-60002"
    affected_package: "openssh-server"
    # Set to the minimum fixed version available in your distro repo.
    # Upstream fixed version is 10.4p1. Adjust if your distro backports under
    # a different version string. Leave as "latest" only if you have verified
    # the repo contains a patched build.
    fixed_version: "latest"
    sshd_service_name: "ssh"   # Debian/Ubuntu: "ssh"; RHEL/CentOS: "sshd" — verify for your OS

  pre_tasks:
    - name: "Abort if not a Debian/Ubuntu-family system"
      ansible.builtin.fail:
        msg: >
          This playbook uses the apt module and targets Debian/Ubuntu systems only.
          Detected OS family: {{ ansible_os_family }}. Adjust for your OS before running.
      when: ansible_os_family != "Debian"

    - name: "Record pre-patch OpenSSH version"
      ansible.builtin.command:
        cmd: ssh -V
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Display pre-patch OpenSSH version"
      ansible.builtin.debug:
        msg: "Pre-patch OpenSSH version on {{ inventory_hostname }}: {{ pre_patch_version.stderr | default(pre_patch_version.stdout) }}"

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Upgrade openssh-server to patched version (CVE-2026-60002)"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: "{{ fixed_version }}"
      register: patch_result
      notify: Restart sshd

    - name: "Also upgrade openssh-client to patched version"
      # The client-side memory corruption path means the client package should
      # also be updated where installed.
      ansible.builtin.apt:
        name: "openssh-client"
        state: "{{ fixed_version }}"
      register: client_patch_result
      failed_when: false   # Client may not be installed on all hosts; non-fatal

    - name: "Audit log — patch applied"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation applied on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          openssh-server changed: {{ patch_result.changed }}.
          openssh-client changed: {{ client_patch_result.changed | default('skipped') }}.

    - name: "Write audit record to local log"
      ansible.builtin.lineinfile:
        path: /var/log/cve_remediation.log
        line: >-
          {{ ansible_date_time.iso8601 }} | {{ cve_id }} | {{ inventory_hostname }}
          | openssh-server changed={{ patch_result.changed }}
          | openssh-client changed={{ client_patch_result.changed | default('N/A') }}
        create: true
        mode: "0640"

  handlers:
    - name: "Restart sshd"
      # WARNING: restarting sshd will drop active SSH sessions on some OSes.
      # Confirm out-of-band access before allowing this handler to execute.
      # Set ANSIBLE_FORCE_HANDLERS=false to suppress if needed.
      ansible.builtin.service:
        name: "{{ sshd_service_name }}"
        state: restarted

  post_tasks:
    - name: "Record post-patch OpenSSH version"
      ansible.builtin.command:
        cmd: ssh -V
      register: post_patch_version
      changed_when: false
      failed_when: false

    - name: "Display post-patch OpenSSH version"
      ansible.builtin.debug:
        msg: "Post-patch OpenSSH version on {{ inventory_hostname }}: {{ post_patch_version.stderr | default(post_patch_version.stdout) }}"

    - name: "Verify sshd is running after remediation"
      ansible.builtin.service_facts:

    - name: "Assert sshd service is active"
      ansible.builtin.assert:
        that:
          - "ansible_facts.services[sshd_service_name ~ '.service'] is defined"
          - "ansible_facts.services[sshd_service_name ~ '.service']['state'] == 'running
