- name: "Remediate CVE-2026-0287 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-0287"
    affected_package: "NOT_APPLICABLE_PANOS_IS_NOT_APT_MANAGED"
    # ANALYST ACTION REQUIRED: Replace with confirmed fixed version from [2]
    fixed_version: "CONFIRM_FROM_VENDOR_ADVISORY"

  tasks:
    - name: "HALT — apt module not applicable to PAN-OS"
      ansible.builtin.fail:
        msg: >
          CVE-2026-0287 affects Palo Alto Networks PAN-OS.
          PAN-OS is not managed by apt. This task is intentionally
          halted. Use the paloaltonetworks.panos collection instead.
          Confirm fixed version from https://security.paloaltonetworks.com/CVE-2026-0287
          before proceeding.

    # The following tasks are structural stubs ONLY and will not execute
    # due to the fail task above. They are retained for template completeness.

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade affected package
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result

    - name: Restart service if package was upgraded
      ansible.builtin.service:
        name: "pan_dataplane"
        state: restarted
      when: patch_result.changed

    - name: Audit log
      ansible.builtin.debug:
        msg: "{{ cve_id }} patched on {{ inventory_hostname }} at {{ ansible_date_time.iso8601 }}"

### PAN-OS Correct Approach — Reference Stub (paloaltonetworks.panos collection)

---
# DRAFT — FOR ANALYST REVIEW ONLY
# Requires: ansible-galaxy collection install paloaltonetworks.panos
# Confirm fixed_version from vendor advisory [2] before use.
# CVE: CVE-2026-0287

- name: "Remediate CVE-2026-0287 — PAN-OS Software Upgrade"
  hosts: "{{ target_group }}"
  gather_facts: false
  vars:
    cve_id: "CVE-2026-0287"
    # ANALYST ACTION REQUIRED: Set to confirmed fixed version from [2]
    fixed_version: "CONFIRM_FROM_VENDOR_ADVISORY"
    provider:
      ip_address: "{{ ansible_host }}"
      username: "{{ panos_username }}"
      password: "{{ panos_password }}"

  tasks:
    - name: "Pre-patch — save full device configuration backup"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "save config to CVE-2026-0287-pre-patch-backup.xml"

    - name: "Download PAN-OS fixed version"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ fixed_version }}"
        download: true
        install: false
        restart: false

    - name: "Install PAN-OS fixed version (no restart)"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ fixed_version }}"
        download: false
        install: true
        restart: false

    - name: "Restart device to apply upgrade"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ fixed_version }}"
        download: false
        install: false
        restart: true
      # ANALYST NOTE: In HA environments, upgrade passive node first.
      # Validate HA failover behaviour before running against active node.

    - name: Audit log
      ansible.builtin.debug:
        msg: "{{ cve_id }} upgrade to {{ fixed_version }} initiated on {{ inventory_hostname }} at {{ ansible_date_time.iso8601 }}"

