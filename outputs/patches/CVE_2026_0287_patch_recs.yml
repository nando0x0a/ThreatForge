**Rollback Risk:**
- PAN-OS upgrades are not delivered via `apt`; they are image-based. Rolling back requires a prior saved configuration snapshot and a downgrade to the previous PAN-OS image via the device management interface or Panorama.
- Risks include: configuration incompatibility on downgrade, session table loss, HA pair split-brain if only one unit is reverted, and potential impact to active IPsec/SSL-VPN tunnels during restart.
- Pre-patch action: take a full device configuration export and snapshot the current running image name before upgrade.

