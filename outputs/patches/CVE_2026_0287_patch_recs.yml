## Ansible Remediation Playbook

> ⚠️ **IMPORTANT — ANALYST REVIEW REQUIRED BEFORE EXECUTION:**
> PAN-OS is a proprietary network operating system and is **not managed via `apt`**. PAN-OS devices are not Linux hosts in an Ansible apt-managed inventory. The standard remediation path for PAN-OS is via the **`paloaltonetworks.panos` Ansible collection** using the PAN-OS XML API, or via Panorama push. The `apt`-based template below is **not applicable** to PAN-OS and has been replaced with the appropriate collection-based approach. The fixed PAN-OS version (`panos_target_version`) **must be populated by the analyst** from the vendor advisory [2] before execution.

---
# DRAFT FOR ANALYST REVIEW
# CVE-2026-0287 — PAN-OS DoS Vulnerabilities in Network Traffic Processing
# Remediation Playbook (paloaltonetworks.panos collection)
#
# Prerequisites:
#   ansible-galaxy collection install paloaltonetworks.panos
#
# !! ANALYST MUST SET panos_target_version FROM VENDOR ADVISORY BEFORE RUNNING !!
# Source: https://security.paloaltonetworks.com/CVE-2026-0287

- name: "Remediate CVE-2026-0287 on PAN-OS devices in {{ target_group }}"
  hosts: "{{ target_group }}"
  connection: local
  gather_facts: false

  vars:
    cve_id: "CVE-2026-0287"
    # REQUIRED: populate from vendor advisory [2] before execution
    panos_target_version: "ANALYST_MUST_SET_THIS"
    provider:
      ip_address: "{{ ansible_host }}"
      username: "{{ panos_username }}"
      password: "{{ panos_password }}"
      # api_key may be used in place of username/password

  pre_tasks:
    - name: "Abort if target version not set"
      ansible.builtin.fail:
        msg: >
          panos_target_version must be set to the fixed PAN-OS version.
          Retrieve it from https://security.paloaltonetworks.com/CVE-2026-0287
          before running this playbook.
      when: panos_target_version == "ANALYST_MUST_SET_THIS"

    - name: "Export device configuration before upgrade (pre-patch snapshot)"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "save config to CVE-2026-0287-pre-upgrade-{{ inventory_hostname }}.xml"
      register: config_export_result

    - name: "Log pre-patch config export"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} — Pre-upgrade config saved on {{ inventory_hostname }}
          at {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}.
          Result: {{ config_export_result }}

  tasks:
    - name: "Check current PAN-OS version"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "show system info"
      register: system_info

    - name: "Log current version"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} — Current system info for {{ inventory_hostname }}:
          {{ system_info.stdout }}

    - name: "Download target PAN-OS software version"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ panos_target_version }}"
        download: true
        install: false
        restart: false
      register: download_result

    - name: "Install target PAN-OS software version"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ panos_target_version }}"
        download: false
        install: true
        restart: false
      register: install_result

    - name: "Restart device to apply upgrade"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ panos_target_version }}"
        download: false
        install: false
        restart: true
      when: install_result.changed

    - name: "Wait for device to come back online"
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 443
        delay: 60
        timeout: 600
        state: started
      when: install_result.changed

    - name: "Verify upgraded PAN-OS version"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "show system info"
      register: post_upgrade_info

    - name: "Audit log — post-patch"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} patched on {{ inventory_hostname }}
          at {{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}.
          Post-upgrade system info: {{ post_upgrade_info.stdout }}

