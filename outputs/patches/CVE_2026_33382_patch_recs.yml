## Validation Steps

1. **Confirm installed package version:**
   ```bash
   apt-cache policy grafana
   # or
   dpkg -l | grep grafana
   
   Verify the installed version is equal to or greater than the confirmed fixed version from [2].

2. **Check Grafana service health:**
   ```bash
   systemctl status grafana-server
   
   Confirm `Active: active (running)`.

3. **Check Grafana HTTP health endpoint:**
   ```bash
   curl -s http://localhost:3000/api/health
   
   Expected response: `{"commit":"<hash>","database":"ok","version":"<fixed_version>"}` — confirm `version` reflects the patched release.

4. **Verify request body size limiting is in effect (where advisory details permit):**
   > Specific configuration parameters enforcing body size limits are not confirmed from available advisory context [2]. If Grafana Labs documents a configuration key (e.g., in `grafana.ini`) as part of the fix, verify that setting is present post-upgrade. Analyst should check [2] for configuration guidance.

5. **Review Grafana logs for errors post-restart:**
   ```bash
   journalctl -u grafana-server --since "10 minutes ago" | grep -i "error\|fatal\|panic"
   

6. **Record post-patch version in change management system** and cross-reference with the CVE remediation ticket for CVE-2026-33382.

