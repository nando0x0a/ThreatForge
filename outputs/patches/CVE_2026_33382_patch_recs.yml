## Ansible Remediation Playbook

---
# DRAFT FOR ANALYST REVIEW
# CVE: CVE-2026-33382
# Description: Grafana DoS via unbounded request body size in API endpoints
# Fixed version: VERIFY BEFORE DEPLOYING — not confirmed from available advisory context
# Urgency: Within 7 days (STANDARD tier) unless scope review elevates
# Last updated: See pipeline run timestamp

- name: "Remediate CVE-2026-33382 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-33382"
    affected_package: "grafana"
    grafana_service_name: "grafana-server"
    # ANALYST ACTION REQUIRED: Set fixed_version to the confirmed fixed version
    # from https://grafana.com/security/security-advisories/cve-2026-33382
    # Example format: "10.4.3"
    # Leave as empty string to upgrade to latest available in repo
    fixed_version: ""

  pre_tasks:
    - name: "ANALYST CHECK — Confirm fixed version is set before proceeding"
      ansible.builtin.fail:
        msg: >
          fixed_version variable is not set. Confirm the fixed version from
          https://grafana.com/security/security-advisories/cve-2026-33382
          and set fixed_version in vars before running this playbook.
      when: fixed_version | length == 0

    - name: Record pre-patch Grafana version
      ansible.builtin.command:
        cmd: grafana-server -v
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: Log pre-patch version
      ansible.builtin.debug:
        msg: "Pre-patch Grafana version on {{ inventory_hostname }}: {{ pre_patch_version.stdout | default('not installed or not found') }}"

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade Grafana to fixed version
      ansible.builtin.apt:
        name: "{{ affected_package }}={{ fixed_version }}"
        state: present
        allow_downgrade: false
      register: patch_result

    - name: Restart Grafana service if package was upgraded
      ansible.builtin.service:
        name: "{{ grafana_service_name }}"
        state: restarted
      when: patch_result.changed

    - name: Pause to allow Grafana service to stabilise post-restart
      ansible.builtin.pause:
        seconds: 10
      when: patch_result.changed

    - name: Verify Grafana service is running post-patch
      ansible.builtin.service:
        name: "{{ grafana_service_name }}"
        state: started
      register: service_status

    - name: Audit log
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} patch applied on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Service running: {{ service_status.status.ActiveState | default('unknown') }}.

