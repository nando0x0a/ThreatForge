## Patch Recommendation

**CVE:** CVE-2020-1350
**Affected Product:** Microsoft Windows DNS Server (dns.exe) — affects Windows Server 2003 through Windows Server 2019. Specifically: Windows Server 2008, 2008 R2, 2012, 2012 R2, 2016, 2019 (all editions running the Windows DNS Server role). Windows DNS client libraries are NOT affected; only hosts acting as DNS servers are vulnerable.
**Fixed Version:** July 2020 Cumulative Update (KB4569509 for Server 2019; KB4571687 for Server 2016; KB4571694 for Server 2012 R2; KB4571736 for Server 2012; KB4571729 for Server 2008 R2 SP1; KB4571730 for Server 2008 SP2). Full patch list published at https://msrc.microsoft.com/update-guide/vulnerability/CVE-2020-1350
**Urgency:** **IMMEDIATE** — CISA KEV confirmed active exploitation, CVSS 10.0, wormable RCE as SYSTEM. Patch within hours, not days.
**Rollback Risk:**
- Cumulative updates may alter DNS server behaviour; regression testing against internal DNS zones is recommended post-patch.
- Revert path: Windows Update rollback via `wusa /uninstall /kb:<KB_NUMBER>` or System Restore if enabled. Note that rollback re-exposes the critical vulnerability and should only be performed if a confirmed service-breaking regression occurs, with immediate compensating controls applied (registry workaround — see Validation Steps).
- The registry-based workaround (TcpReceivePacketSize = 0xFF00) is available as a temporary compensating control if patching must be delayed for change-management reasons, but it does not fully remediate the vulnerability and must not substitute for patching.

