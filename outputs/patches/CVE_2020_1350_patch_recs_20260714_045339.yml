## Ansible Remediation Playbook

---
# DRAFT FOR ANALYST REVIEW
# CVE:          CVE-2020-1350 (SIGRed)
# Component:    BIND9 DNS Server (Linux/Debian-family hosts only)
# Urgency:      IMMEDIATE - CISA KEV, CVSS 10.0, Active Exploitation Confirmed
# Generated:    ThreatForge - Proposed draft, requires analyst validation
# NOTE:         CVE-2020-1350 is a Windows DNS Server vulnerability. This playbook
#               targets Linux BIND9 as a compensating/hybrid-environment measure.
#               For Windows DNS Server remediation, use WSUS/SCCM/win_updates.

- name: "Remediate CVE-2020-1350 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2020-1350"
    affected_package: "bind9"
    dns_service_name: "named"
    patch_log_path: "/var/log/cve_patch_audit.log"

  pre_tasks:
    - name: "Assert target is Debian/Ubuntu family"
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >
          This playbook targets Debian/Ubuntu hosts only.
          For RHEL/CentOS use the bind package via yum/dnf.
          For Windows DNS Server use win_updates or WSUS targeting KB4569509 et al.

    - name: "Record pre-patch BIND version"
      ansible.builtin.command:
        cmd: named -v
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Log pre-patch state"
      ansible.builtin.debug:
        msg: >
          [{{ cve_id }}] Pre-patch DNS version on {{ inventory_hostname }}:
          {{ pre_patch_version.stdout | default('named not found or not installed') }}

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Upgrade bind9 package to latest available version"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
        only_upgrade: true
      register: patch_result

    - name: "Upgrade bind9utils (companion package)"
      ansible.builtin.apt:
        name: "bind9utils"
        state: latest
        only_upgrade: true
      register: utils_patch_result

    - name: "Upgrade bind9-dnsutils (companion package)"
      ansible.builtin.apt:
        name: "bind9-dnsutils"
        state: latest
        only_upgrade: true
      register: dnsutils_patch_result
      failed_when: false  # Package name varies across distro versions

    - name: "Restart BIND9 service if any package was upgraded"
      ansible.builtin.service:
        name: "{{ dns_service_name }}"
        state: restarted
      when: >
        patch_result.changed or
        utils_patch_result.changed or
        dnsutils_patch_result.changed

    - name: "Verify BIND9 service is running post-restart"
      ansible.builtin.service:
        name: "{{ dns_service_name }}"
        state: started
        enabled: true

    - name: "Record post-patch BIND version"
      ansible.builtin.command:
        cmd: named -v
      register: post_patch_version
      changed_when: false

    - name: "Write audit log entry"
      ansible.builtin.lineinfile:
        path: "{{ patch_log_path }}"
        line: >
          {{ ansible_date_time.iso8601 }} | {{ cve_id }} |
          host={{ inventory_hostname }} |
          pre={{ pre_patch_version.stdout | default('unknown') }} |
          post={{ post_patch_version.stdout | default('unknown') }} |
          changed={{ patch_result.changed }}
        create: true
        mode: '0640'

    - name: "Audit log summary"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} patch task completed on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Post-patch version: {{ post_patch_version.stdout }}.

