## Validation Steps

**1. Confirm patch installation (Linux/BIND9):**
named -v
# Expected: version string reflecting patched BIND9 release in distro repo
apt-cache policy bind9
# Confirm installed version matches candidate (latest available)

**2. Confirm BIND9 service health:**
systemctl status named
# Expected: active (running)
journalctl -u named --since "10 minutes ago" | grep -i error
# Expected: no critical errors

**3. Test DNS resolution:**
dig @<dns-server-ip> google.com
# Expected: ANSWER SECTION populated, status: NOERROR

