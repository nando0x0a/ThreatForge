## Ansible Remediation Playbook

> **DRAFT — This playbook targets Debian/Ubuntu-based GitLab omnibus installations managed via apt. Analyst must verify package name, target inventory, and service name before execution. For GitLab installations using the Helm chart, RPM-based systems, or source installs, this playbook does not apply.**

---
- name: "Remediate CVE-2026-13320 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-13320"
    affected_package: "gitlab-ee"
    # NOTE: Change to "gitlab-ce" if running GitLab Community Edition.
    # Target fixed versions: 18.11.7, 19.0.4, or 19.1.2 depending on
    # your current release line. Analyst must confirm the appropriate
    # pinned version for their environment before running.
    gitlab_service_name: "gitlab-runsvdir"

  pre_tasks:
    - name: "Assert that apt package manager is available"
      ansible.builtin.assert:
        that:
          - ansible_pkg_mgr == "apt"
        fail_msg: >
          This playbook requires apt. Non-Debian/Ubuntu hosts detected.
          Do not run this playbook on RPM-based systems.

    - name: "Record pre-patch GitLab version for audit"
      ansible.builtin.command:
        cmd: gitlab-rake gitlab:env:info
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Log pre-patch version"
      ansible.builtin.debug:
        msg: "Pre-patch environment info on {{ inventory_hostname }}: {{ pre_patch_version.stdout | default('unavailable') }}"

    - name: "Create GitLab backup before patching"
      ansible.builtin.command:
        cmd: gitlab-backup create STRATEGY=copy
      register: backup_result
      changed_when: true
      # NOTE: Backup may take significant time depending on repository size.
      # Analyst should consider running this step separately during a
      # maintenance window before the playbook run, especially on large instances.

    - name: "Log backup result"
      ansible.builtin.debug:
        msg: "Backup result on {{ inventory_hostname }}: {{ backup_result.stdout | default('unavailable') }}"

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Upgrade affected GitLab package to latest available fixed version"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
        # ANALYST NOTE: If your apt repository is pinned to a specific
        # minor release (e.g., 19.1.x), 'state: latest' will install
        # the latest in that channel. If you manage multiple minor
        # release lines across your fleet, consider pinning explicitly:
        #   name: "{{ affected_package }}=19.1.2-ce.0"
        # Confirm available versions with: apt-cache policy gitlab-ee
      register: patch_result

    - name: "Reconfigure GitLab after package upgrade"
      ansible.builtin.command:
        cmd: gitlab-ctl reconfigure
      when: patch_result.changed
      register: reconfigure_result
      changed_when: true

    - name: "Restart GitLab services after upgrade and reconfigure"
      ansible.builtin.service:
        name: "{{ gitlab_service_name }}"
        state: restarted
      when: patch_result.changed

    - name: "Wait for GitLab to become healthy post-restart"
      ansible.builtin.command:
        cmd: gitlab-ctl status
      register: health_check
      retries: 10
      delay: 15
      until: health_check.rc == 0
      when: patch_result.changed
      changed_when: false

    - name: "Record post-patch GitLab version for audit"
      ansible.builtin.command:
        cmd: gitlab-rake gitlab:env:info
      register: post_patch_version
      changed_when: false
      failed_when: false
      when: patch_result.changed

    - name: "Audit log — patch applied"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} patch applied on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Post-patch info: {{ post_patch_version.stdout | default('N/A — no change detected') }}
      when: patch_result.changed

    - name: "Audit log — no change required"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }}: No package change on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Host may already be running a fixed version, or the apt
          repository does not yet carry the fixed package.
          Analyst must verify manually.
      when: not patch_result.changed

