## Patch Recommendation

> **DRAFT — For analyst review before operational use.**

**CVE:** CVE-2026-13320

**Affected Product:** GitLab CE/EE — versions >= 15.7 < 18.11.7, >= 19.0 < 19.0.4, and >= 19.1 < 19.1.2 [1][4]

**Fixed Version:** 18.11.7, 19.0.4, or 19.1.2 (apply the fixed version matching your current minor release line) [2]

**Urgency:** Within 7 days — Priority Tier is MONITOR. The vulnerability carries a CVSS score of 7.3 (HIGH) [1] and requires authenticated access to exploit, reducing the immediate threat surface. No public proof-of-concept is known, further supporting a non-emergency patching window.

**Rollback Risk:**
- GitLab does not support in-place downgrade of its omnibus package; rollback requires restoring from a pre-patch backup of both the application and the PostgreSQL/Gitaly data stores.
- Database migrations run automatically on upgrade and are generally not reversible without a full database restore.
- Recommended: Snapshot the VM or take a full GitLab backup (`gitlab-backup create`) immediately before applying the patch.
- If using GitLab Helm chart (Kubernetes), document the current chart version and image tags before upgrading so you can roll back the Helm release if needed.

