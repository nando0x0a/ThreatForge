Confirm the installed version is 18.11.7, 19.0.4, or 19.1.2 (or higher within your minor line) [2].

**2. Confirm GitLab application version via UI:**
Navigate to **Admin Area → Dashboard** (or `/admin`) and verify the displayed GitLab version matches the expected fixed release.

**3. Verify service health:**
sudo gitlab-ctl status
All services (nginx, puma, sidekiq, gitaly, postgresql, etc.) should report `run`.

**4. Run GitLab's built-in environment check:**
sudo gitlab-rake gitlab:env:info
sudo gitlab-rake gitlab:check
Review output for errors. The version line should reflect the patched release.

