## Ansible Remediation Playbook

---
# DRAFT FOR ANALYST REVIEW
# CVE: CVE-2026-63030
# WordPress SQL Injection / RCE via REST API batch endpoint
# CISA KEV: ACTIVELY EXPLOITED — patch immediately
# Sources: [1] NVD, [2] CISA KEV, [3] GitHub Advisory GHSA-fpp7-x2x2-2mjf
#
# WARNING: This playbook targets environments where WordPress is installed
# via the distro apt package (e.g., Debian/Ubuntu 'wordpress' package).
# If WordPress was installed manually or via WP-CLI, use the commented
# WP-CLI tasks instead and disable the apt tasks.
# Analyst must verify the correct installation method before running.

- name: "Remediate CVE-2026-63030 — WordPress SQLi/RCE on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-63030"
    affected_package: "wordpress"
    # WordPress service: adjust to match your environment.
    # Common values: apache2, nginx, php8.1-fpm, php8.2-fpm
    web_service: "apache2"
    # WP-CLI path — used only if switching to WP-CLI tasks
    wpcli_path: "/usr/local/bin/wp"
    # WordPress installation path — used only if switching to WP-CLI tasks
    wp_install_path: "/var/www/html"
    # WordPress user — used only if switching to WP-CLI tasks
    wp_user: "www-data"

  pre_tasks:
    - name: "Pre-patch — verify target host facts"
      ansible.builtin.setup:
        gather_subset:
          - "!all"
          - "date_time"
          - "distribution"

    - name: "Pre-patch — confirm OS is Debian/Ubuntu family (apt prerequisite)"
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >
          This playbook uses the apt module and requires a Debian/Ubuntu host.
          For RHEL/CentOS or manual WordPress installs, adapt accordingly.
        success_msg: "OS family confirmed: {{ ansible_os_family }}"

    - name: "Pre-patch — record installed WordPress package version (apt)"
      ansible.builtin.shell:
        cmd: "dpkg-query -W -f='${Version}' {{ affected_package }} 2>/dev/null || echo 'NOT_INSTALLED_VIA_APT'"
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Pre-patch — display current version"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }}: Pre-patch WordPress version on {{ inventory_hostname }}:
          {{ pre_patch_version.stdout }}

    - name: "Pre-patch — warn if not installed via apt"
      ansible.builtin.debug:
        msg: >
          WARNING: WordPress does not appear to be installed via apt on
          {{ inventory_hostname }}. Output: '{{ pre_patch_version.stdout }}'.
          Manual or WP-CLI installation may be present. Analyst review required
          before proceeding. Consider using WP-CLI tasks (see playbook comments).
      when: "'NOT_INSTALLED_VIA_APT' in pre_patch_version.stdout"

  tasks:
    # === APT-BASED TASKS (for distro-packaged WordPress) ===
    # Disable these tasks if WordPress is installed via WP-CLI or manually.

    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Upgrade WordPress package to patched version (apt)"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result
      when: "'NOT_INSTALLED_VIA_APT' not in pre_patch_version.stdout"

    # === WP-CLI ALTERNATIVE TASKS ===
    # Uncomment and adapt these tasks for manual/WP-CLI WordPress installations.
    # Disable the apt tasks above when using these.
    #
    # - name: "Check current WordPress version via WP-CLI"
    #   ansible.builtin.command:
    #     cmd: "{{ wpcli_path }} core version --path={{ wp_install_path }} --allow-root"
    #   become_user: "{{ wp_user }}"
    #   register: wpcli_version_check
    #   changed_when: false
    #
    # - name: "Update WordPress core via WP-CLI to patched version"
    #   ansible.builtin.command:
    #     cmd: >
    #       {{ wpcli_path }} core update
    #       --path={{ wp_install_path }}
    #       --allow-root
    #       --version=6.9.5
    #   become_user: "{{ wp_user }}"
    #   register: wpcli_patch_result
    #   # NOTE: Set --version=7.0.2 if running 7.0.x branch [1][3]
    #   # Analyst must confirm target branch before running.
    #
    # - name: "Verify WP-CLI update result"
    #   ansible.builtin.debug:
    #     msg: "WP-CLI update output: {{ wpcli_patch_result.stdout }}"

    - name: "Restart web service if package was upgraded"
      ansible.builtin.service:
        name: "{{ web_service }}"
        state: restarted
