## Patch Recommendation

> **DRAFT FOR ANALYST REVIEW** — Verify all version numbers, package names, and service identifiers against your environment before executing.

**CVE:** CVE-2026-63030

**Affected Product:** WordPress Core — versions 6.9.x < 6.9.5 and 7.0.x < 7.0.2 [1][3]

**Fixed Version:** WordPress 6.9.5 (for 6.9.x branch) or 7.0.2 (for 7.0.x branch) [1][3]

**Urgency:** **IMMEDIATE** — This vulnerability is rated CVSS 9.8 (CRITICAL) [1], is listed in the CISA Known Exploited Vulnerabilities Catalog as actively exploited in the wild [2], enables unauthenticated remote code execution over the network (AV:N/PR:N/UI:N) [1][5], and has 86 known public proof-of-concept exploits [6][7]. It is 3 days old and carries a Priority Tier of CRITICAL — ACT NOW. Patch within hours, not days.

**Rollback Risk:**
- WordPress core updates can break plugin or theme compatibility. Identify and test against known plugin dependencies before production rollout.
- Database schema changes introduced between versions may prevent clean downgrade. Take a full database backup before patching.
- The REST API batch endpoint involved in this vulnerability [3][4] may be used by plugins; verify plugin functionality post-patch.
- Revert method: restore WordPress core files from a pre-patch snapshot and restore the database backup. In managed hosting environments, use the host's point-in-time restore feature.
- If using `wordpress` apt/deb packaging (e.g., Debian/Ubuntu distro package), note that distro-packaged WordPress versions frequently lag behind upstream. **Analyst must confirm whether the distro package has been updated to a fixed version before relying on the apt playbook below.** If not, manual upstream installation or a CMS-native update (WP-CLI) is required.

> ⚠️ **IMPORTANT NOTE:** WordPress is not typically distributed as an `apt` package on production servers — it is most commonly installed manually, via WP-CLI, or through managed hosting panels. The Ansible playbook below uses the `apt` module for environments where WordPress is installed via a distribution package (e.g., the `wordpress` package on Debian/Ubuntu). **For servers using manual or WP-CLI installations, a WP-CLI-based playbook is more appropriate.** Analyst must verify the installation method before use. WP-CLI alternative task is noted inline in the playbook comments.

