## Patch Recommendation

> **DRAFT — For analyst review before operational use.**

**CVE:** CVE-2026-6896
**Affected Product:** GitLab EE — versions >= 13.11 < 18.11.7, >= 19.0 < 19.0.4, and >= 19.1 < 19.1.2 [1]
**Fixed Version:** 18.11.7, 19.0.4, or 19.1.2 (apply the fixed version corresponding to your installed branch) [2]
**Urgency:** Within 7 days — Priority Tier is MONITOR; CVSS 8.7 (HIGH) [1] with no public PoC known and exploit requiring an authenticated developer role reduces immediate exposure, but the stored XSS nature and potential for session hijacking across user contexts warrant prompt action.
**Rollback Risk:**
- GitLab upgrades modify the Rails application, database schema migrations, and bundled assets. Rolling back may require restoring from a pre-upgrade backup snapshot (Omnibus: `/etc/gitlab`, `/var/opt/gitlab`) and running `gitlab-ctl reconfigure` against a restored backup.
- Database migrations applied during upgrade may not be automatically reversible; confirm with `gitlab-rake db:migrate:status` before and after.
- Reverting will re-expose CVE-2026-6896; document the risk acceptance if rollback is executed.
- For GitLab installed via the official Linux package (Omnibus), hold the package at the rolled-back version using `apt-mark hold gitlab-ee` to prevent unintended re-upgrade.

