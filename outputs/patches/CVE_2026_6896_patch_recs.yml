## Ansible Remediation Playbook

> **DRAFT — This playbook targets Debian/Ubuntu hosts running GitLab EE via the official Omnibus apt repository. Analyst must verify package name, repository configuration, and target inventory before execution. This playbook does not perform database backup — back up GitLab before running in production.**

---
- name: "Remediate CVE-2026-6896 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-6896"
    affected_package: "gitlab-ee"
    # Set to the fixed version matching your installed branch:
    #   18.x branch: 18.11.7-ee.0
    #   19.0 branch: 19.0.4-ee.0
    #   19.1 branch: 19.1.2-ee.0
    # Analyst must verify the exact epoch/revision string available in the repo.
    target_version: "19.1.2-ee.0"

  pre_tasks:
    - name: "Assert target_version is defined and non-empty"
      ansible.builtin.assert:
        that:
          - target_version is defined
          - target_version | length > 0
        fail_msg: >
          target_version must be set to the fixed GitLab EE package version
          appropriate for your installed branch. See CVE-2026-6896 advisory.

    - name: "Capture pre-patch GitLab version"
      ansible.builtin.command:
        cmd: gitlab-rake gitlab:env:info
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Log pre-patch version"
      ansible.builtin.debug:
        msg: "Pre-patch GitLab info on {{ inventory_hostname }}: {{ pre_patch_version.stdout | default('unavailable') }}"

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Upgrade gitlab-ee to fixed version (CVE-2026-6896)"
      ansible.builtin.apt:
        name: "{{ affected_package }}={{ target_version }}"
        state: present
        allow_downgrade: false
      register: patch_result

    - name: "Run gitlab-ctl reconfigure after package upgrade"
      ansible.builtin.command:
        cmd: gitlab-ctl reconfigure
      when: patch_result.changed
      register: reconfigure_result
      changed_when: reconfigure_result.rc == 0

    - name: "Restart GitLab services after reconfigure"
      ansible.builtin.command:
        cmd: gitlab-ctl restart
      when: patch_result.changed
      register: restart_result
      changed_when: restart_result.rc == 0

    - name: "Audit log — patch applied"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation attempted on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Target version: {{ target_version }}.

    - name: "Write audit record to local log"
      ansible.builtin.lineinfile:
        path: /var/log/cve_remediation.log
        line: >
          {{ ansible_date_time.iso8601 }} | {{ cve_id }} |
          host={{ inventory_hostname }} |
          package={{ affected_package }}={{ target_version }} |
          changed={{ patch_result.changed }}
        create: true
        mode: '0640'

  post_tasks:
    - name: "Capture post-patch GitLab version"
      ansible.builtin.command:
        cmd: gitlab-rake gitlab:env:info
      register: post_patch_version
      changed_when: false
      failed_when: false

    - name: "Log post-patch version"
      ansible.builtin.debug:
        msg: "Post-patch GitLab info on {{ inventory_hostname }}: {{ post_patch_version.stdout | default('unavailable') }}"

