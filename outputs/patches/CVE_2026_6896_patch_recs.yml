## Validation Steps

> Perform these steps on each patched host (or via Ansible ad-hoc commands).

1. **Verify installed package version:**
   ```bash
   apt-cache policy gitlab-ee | grep Installed
   # Expected: Installed version should match the fixed version for your branch
   # (18.11.7, 19.0.4, or 19.1.2) [2]
   

2. **Verify GitLab application version:**
   ```bash
   gitlab-rake gitlab:env:info | grep -i "GitLab version"
   # Confirm output shows 18.11.7, 19.0.4, or 19.1.2 as appropriate [2]
   

3. **Confirm GitLab services are healthy:**
   ```bash
   gitlab-ctl status
   # All services (puma, sidekiq, postgresql, redis, nginx, etc.) should show 'run'
   

4. **Run GitLab built-in health check:**
   ```bash
   gitlab-rake gitlab:check
   # Review any FAILED items; resolve before returning instance to production
   

5. **Check audit log entry:**
   ```bash
