## Validation Steps

1. **Confirm installed version:**
   - For pip deployments:
     
     pip show open-webui
     
     Verify `Version:` is `0.10.0` or later [1][3].

   - For Docker deployments:
     
     docker inspect <container_name> | grep -i image
     
     Verify the image tag is `0.10.0` or later.

2. **Verify the fix commit is present** (if building from source):
   Confirm commit `05098d25a58d03738e01c4e85e8852c3b4ad849c` [2] is included in the deployed code:
   
   git -C /path/to/open-webui log --oneline | grep 05098d2
   

3. **Functional smoke test:**
   - Access the Open WebUI interface and confirm normal operation.
   - Review application logs for errors after restart.

4. **Path traversal regression check (non-exploitative):**
   - Using a controlled test, issue a request to the proxy endpoint with a double-encoded traversal path (e.g., `%252e%252e%252f`) and confirm the application returns a 400 or 403 error rather than resolving the path. **Do not test against production systems.** Coordinate with your security team and reference advisory [5] for technical detail on the expected behaviour post-fix.

5. **Check service health:**
   
   systemctl status open-webui
   
   Confirm the service is active and not in a failed state.

