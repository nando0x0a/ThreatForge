## Ansible Remediation Playbook

---
# DRAFT FOR ANALYST REVIEW
# CVE-2026-59221 — Open WebUI path traversal via insufficient percent-encoding
# in _sanitize_proxy_path. Affects 0.9.6 before 0.10.0.
# Sources: [1] https://nvd.nist.gov/vuln/detail/CVE-2026-59221
#          [3] https://github.com/open-webui/open-webui/pull/26050
#          [5] https://github.com/open-webui/open-webui/security/advisories/GHSA-frvj-c5qp-xj4w
#
# NOTE: Open WebUI is typically installed via pip or Docker, not apt.
# This playbook provides both apt and pip tasks. Comment out whichever
# does not apply to your deployment. Validate package names and service
# names against your environment before running.

- name: "Remediate CVE-2026-59221 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2026-59221"
    affected_package: "open-webui"
    fixed_version: "0.10.0"
    # Set deployment_method to 'apt' or 'pip' to match your environment
    deployment_method: "pip"

  tasks:
    - name: "Pre-check — record installed version (pip)"
      ansible.builtin.command:
        cmd: pip show open-webui
      register: pre_version_pip
      changed_when: false
      failed_when: false
      when: deployment_method == "pip"

    - name: "Pre-check — log installed version"
      ansible.builtin.debug:
        msg: "Pre-patch open-webui info: {{ pre_version_pip.stdout | default('not installed via pip') }}"
      when: deployment_method == "pip"

    # --- APT-BASED DEPLOYMENT ---
    - name: "Update apt cache (apt deployment)"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: deployment_method == "apt"

    - name: "Upgrade open-webui package via apt"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result_apt
      when: deployment_method == "apt"

    # --- PIP-BASED DEPLOYMENT ---
    - name: "Upgrade open-webui to fixed version via pip"
      ansible.builtin.pip:
        name: "{{ affected_package }}"
        version: "{{ fixed_version }}"
        state: present
        executable: pip3
      register: patch_result_pip
      when: deployment_method == "pip"

    # --- SERVICE RESTART ---
    - name: "Restart open-webui service if upgraded (apt)"
      ansible.builtin.service:
        name: "open-webui"
        state: restarted
      when:
        - deployment_method == "apt"
        - patch_result_apt.changed
      # ANALYST NOTE: Confirm the exact systemd service name for your
      # installation. Common names: open-webui, openwebui.

    - name: "Restart open-webui service if upgraded (pip)"
      ansible.builtin.service:
        name: "open-webui"
        state: restarted
      when:
        - deployment_method == "pip"
        - patch_result_pip.changed
      # ANALYST NOTE: Confirm the exact systemd service name for your
      # installation. If running via Docker, replace with a
      # community.docker.docker_container task to recreate the container
      # using the open-webui:0.10.0 image tag.

    - name: "Post-check — record installed version after patch (pip)"
      ansible.builtin.command:
        cmd: pip show open-webui
      register: post_version_pip
      changed_when: false
      failed_when: false
      when: deployment_method == "pip"

    - name: "Post-check — log installed version after patch"
      ansible.builtin.debug:
        msg: "Post-patch open-webui info: {{ post_version_pip.stdout | default('not installed via pip') }}"
      when: deployment_method == "pip"

    - name: "Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation applied on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Target fixed version: {{ fixed_version }}.
          Deployment method used: {{ deployment_method }}.

