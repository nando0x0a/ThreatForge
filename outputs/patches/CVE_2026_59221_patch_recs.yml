**Affected Product:** Open WebUI versions 0.9.6 up to (but not including) 0.10.0 [1][4]

**Fixed Version:** 0.10.0 [1][3]

**Urgency:** Within 7 days — Priority Tier is MONITOR [1]. However, note that a public proof-of-concept exists [5], which elevates practical risk. Analysts should reassess urgency if exploitation activity is observed in the wild.

**Rollback Risk:**
- Open WebUI 0.10.0 may introduce breaking changes relative to 0.9.x (major minor version bump). Configuration files, model settings, and API integrations should be tested in a staging environment before production rollout.
- If a rollback to 0.9.6 is required, the previous container image or package version should be preserved prior to upgrade. Document all environment variables and volume mounts before upgrading.
- NOTE: Open WebUI is predominantly distributed as a Python package (`pip install open-webui`) or as a Docker container, **not** as a system-level `apt` package. The Ansible playbook below is provided for completeness where a pip-based or containerised deployment is managed via Ansible; adapt to your deployment method. If no `apt` package exists in your distribution's repositories for `open-webui`, the pip task variant (commented in the playbook) should be used instead. Specific distribution package availability is not confirmed in the available sources; analysts should verify before running.

