## Ansible Remediation Playbook

> **DRAFT FOR ANALYST REVIEW** — Validate against target environment before execution. Confirm package name variant (`apache2` vs `httpd`) matches the target OS distribution. This playbook targets Debian/Ubuntu systems using `apt`. For RHEL/CentOS, substitute `ansible.builtin.yum` or `ansible.builtin.dnf` and package name `httpd`.

---
- name: "Remediate CVE-2021-41773 and CVE-2021-42013 on {{ target_group }}"
  hosts: "{{ target_group }}"
  become: true
  vars:
    cve_id: "CVE-2021-41773"
    related_cve: "CVE-2021-42013"
    affected_package: "apache2"
    service_name: "apache2"
    minimum_safe_version: "2.4.51"
    config_backup_path: "/root/apache2_backup_pre_patch"

  pre_tasks:
    - name: "Assert target OS family is Debian-based"
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: >
          This playbook targets Debian/Ubuntu (apt). Detected OS family:
          {{ ansible_os_family }}. Halt and use appropriate package manager playbook.
        success_msg: "OS family confirmed as Debian. Proceeding."

    - name: "Record pre-patch Apache version for audit trail"
      ansible.builtin.command:
        cmd: apache2 -v
      register: pre_patch_version
      changed_when: false
      failed_when: false

    - name: "Log pre-patch version"
      ansible.builtin.debug:
        msg: >
          Pre-patch Apache version on {{ inventory_hostname }}:
          {{ pre_patch_version.stdout | default('apache2 not found or not running') }}

    - name: "Backup Apache configuration directory"
      ansible.builtin.copy:
        src: /etc/apache2/
        dest: "{{ config_backup_path }}/"
        remote_src: true
        mode: preserve
      ignore_errors: true

  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "Upgrade Apache HTTP Server package to resolve {{ cve_id }} and {{ related_cve }}"
      ansible.builtin.apt:
        name: "{{ affected_package }}"
        state: latest
      register: patch_result

    - name: "Verify installed version meets minimum safe version requirement ({{ minimum_safe_version }})"
      ansible.builtin.command:
        cmd: apache2 -v
      register: post_patch_version
      changed_when: false

    - name: "Fail if installed version is still below minimum safe version"
      ansible.builtin.fail:
        msg: >
          PATCH VERIFICATION FAILED on {{ inventory_hostname }}.
          Installed Apache version does not confirm >= {{ minimum_safe_version }}.
          Manual review required. Raw version output: {{ post_patch_version.stdout }}
      when: >
        post_patch_version.stdout is defined and
        ('2.4.49' in post_patch_version.stdout or '2.4.50' in post_patch_version.stdout)

    - name: "Validate Apache configuration syntax before restart"
      ansible.builtin.command:
        cmd: apache2ctl configtest
      register: config_test
      changed_when: false
      failed_when: "'Syntax OK' not in config_test.stdout and 'Syntax OK' not in config_test.stderr"

    - name: "Restart Apache service if package was upgraded"
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
      when: patch_result.changed

    - name: "Confirm Apache service is running post-patch"
      ansible.builtin.service_facts:

    - name: "Assert Apache service is in running state"
      ansible.builtin.assert:
        that:
          - ansible_facts.services[service_name + '.service'] is defined
          - ansible_facts.services[service_name + '.service'].state == 'running'
        fail_msg: >
          Apache service is NOT running on {{ inventory_hostname }} after patch.
          Immediate investigation required. Config backup available at {{ config_backup_path }}.
        success_msg: "Apache service confirmed running on {{ inventory_hostname }}."

    - name: "Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} (and {{ related_cve }}) remediation attempted on
          {{ inventory_hostname }} at {{ ansible_date_time.iso8601 }}.
          Package changed: {{ patch_result.changed }}.
          Post-patch version: {{ post_patch_version.stdout | default('unknown') }}.

  post_tasks:
    - name: "Write remediation record to local control node log"
      ansible.builtin.lineinfile:
        path: "./cve_remediation_log.txt"
        line: >
          {{ ansible_date_time.iso8601 }} | {{ inventory_hostname }} |
          {{ cve_id }} | package={{ affected_package }} |
          changed={{ patch_result.changed }} |
          post_version={{ post_patch_version.stdout | default('unknown') | regex_replace('\n', ' ') }}
        create: true
        mode: '0600'
      delegate_to: localhost

