## Patch Recommendation

**CVE:** CVE-2021-41773
**Affected Product:** Apache HTTP Server (httpd) — versions 2.4.49 specifically; CVE-2021-42013 extends impact to 2.4.50. Both versions are vulnerable and actively exploited.
**Fixed Version:** Apache HTTP Server 2.4.51 or later. Note: the patch issued under CVE-2021-41773 (2.4.50) is insufficient — upgrade must reach 2.4.51 minimum to address both CVE-2021-41773 and CVE-2021-42013.
**Urgency:** IMMEDIATE — patch within 24 hours. CISA KEV confirmed active exploitation; CVSS 9.8 with RCE capability. Priority Tier: CRITICAL.
**Rollback Risk:**
- Apache configuration directives deprecated or changed between minor versions may cause service startup failure post-upgrade.
- Module compatibility: third-party or custom Apache modules compiled against 2.4.49/2.4.50 may fail to load against 2.4.51+. Audit loaded modules (`apache2ctl -M`) before patching.
- Virtual host or `.htaccess` syntax changes may result in 500 errors if configurations use non-standard directives.
- Revert procedure: retain the original package version via `apt-cache show apache2` before upgrade, snapshot the host if virtualised, or use `apt install apache2=<previous_version>` with a local package cache. Always backup `/etc/apache2/` prior to patching.

