# DRAFT FOR ANALYST REVIEW
# CVE:     CVE-2026-0281
# Product: Palo Alto Networks PAN-OS
# Source:  https://security.paloaltonetworks.com/CVE-2026-0281
# WARNING: Confirm fixed_panos_version from vendor advisory before running.
# WARNING: Test on a non-production device or HA passive peer first.
# WARNING: No public PoC known; urgency is STANDARD (within 7 days).

- name: "Remediate CVE-2026-0281 — PAN-OS management web interface session token disclosure"
  hosts: "{{ target_group }}"
  gather_facts: false
  vars:
    cve_id: "CVE-2026-0281"
    # REQUIRED: Set this to the vendor-confirmed fixed PAN-OS version [2]
    # before running. Value below is a placeholder only.
    fixed_panos_version: "PLACEHOLDER_VERIFY_WITH_ADVISORY"
    provider:
      ip_address: "{{ ansible_host }}"
      username: "{{ panos_username }}"
      password: "{{ panos_password }}"
      # Alternatively use api_key for token-based auth

  tasks:

    - name: "Assert fixed version variable has been set"
      ansible.builtin.assert:
        that:
          - fixed_panos_version != "PLACEHOLDER_VERIFY_WITH_ADVISORY"
        fail_msg: >
          STOP: fixed_panos_version must be set to the vendor-confirmed fixed
          version from https://security.paloaltonetworks.com/CVE-2026-0281
          before running this playbook. See CVE-2026-0281 advisory [2].

    - name: "Retrieve current PAN-OS software version"
      paloaltonetworks.panos.panos_op:
        provider: "{{ provider }}"
        cmd: "show system info"
      register: system_info

    - name: "Display current version for audit"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} — current PAN-OS state on {{ inventory_hostname }}:
          {{ system_info.stdout | default('unable to retrieve') }}

    - name: "Download target PAN-OS software version"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ fixed_panos_version }}"
        download: true
        install: false
        restart: false
      register: download_result

    - name: "Install target PAN-OS software version"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ fixed_panos_version }}"
        download: false
        install: true
        restart: false
      register: install_result
      when: download_result is succeeded

    - name: "Restart device to apply new PAN-OS version"
      paloaltonetworks.panos.panos_software:
        provider: "{{ provider }}"
        version: "{{ fixed_panos_version }}"
        download: false
        install: false
        restart: true
      when: install_result is succeeded and install_result.changed

    - name: "Audit log"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} patch sequence completed on {{ inventory_hostname }}.
          Target version: {{ fixed_panos_version }}.
          Timestamp: {{ ansible_date_time.iso8601 | default('unavailable') }}.
          DRAFT — analyst must verify post-patch version independently.


