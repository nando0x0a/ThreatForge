## Ansible Remediation Playbook

> ⚠️ **IMPORTANT LIMITATION — ANALYST REVIEW REQUIRED BEFORE USE**
> PAN-OS is a proprietary Palo Alto Networks operating system running on dedicated hardware or VM-Series appliances. It **cannot** be patched via the Linux `apt` package manager. The playbook below uses the `paloaltonetworks.panos` Ansible collection (via PAN-OS API) as the appropriate remediation vehicle. Replace placeholder version strings with confirmed fixed versions from the advisory [2] before execution. If the `paloaltonetworks.panos` collection is unavailable in your environment, patching must be performed manually via Panorama, the PAN-OS web UI, or CLI.
>
> The `apt`-based template is retained in skeleton form below the PAN-OS playbook for audit trail purposes, annotated as non-applicable.

