## Patch Recommendation

> **⚠️ DRAFT — For analyst review before operational use.**

**CVE:** CVE-2026-10699
**Affected Product:** Progress MOVEit Transfer — versions 2025.0.0 before 2025.0.8, 2025.1.0 before 2025.1.4, and 2026.0.0 before 2026.0.1 [1][2]
**Fixed Version:** 2025.0.8, 2025.1.4, or 2026.0.1 (apply the fixed release corresponding to your current branch) [2]
**Urgency:** Within 24 hours — Priority Tier: HIGH PRIORITY [1]. This vulnerability is network-exploitable with no privileges required (AV:N/PR:N/UI:N) and is flagged RCE-capable at CVSS 7.5 HIGH [1]. Although no public PoC is currently known, the attack surface is broad and the vulnerability is only 6 days old.
**Rollback Risk:**
- MOVEit Transfer upgrades may alter database schema; consult Progress rollback documentation before applying [2].
- Custom Reports module configurations may need re-validation post-upgrade.
- Recommended: snapshot/backup the MOVEit Transfer host and database prior to patching.
- Revert path: restore from pre-patch snapshot and contact Progress Support via the advisory portal [2].

> **⚠️ IMPORTANT DEPLOYMENT NOTE:** Progress MOVEit Transfer is a Windows-based application distributed as a vendor installer (`.exe`/`.msi`), not a Linux apt package [2]. The Ansible playbook below uses the `win_package` module appropriate for Windows targets. **Do not use the `apt` module for this product.** The playbook below is a draft and must be reviewed and adapted by an analyst familiar with your MOVEit deployment topology before execution.

