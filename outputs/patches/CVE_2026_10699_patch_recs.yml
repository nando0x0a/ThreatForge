## Validation Steps

> **DRAFT — Validate each step in a test environment before production use.**

**1. Verify installed version (Windows Registry / About page):**
# Run on patched host
Get-ItemProperty -Path "HKLM:\SOFTWARE\Progress\MOVEit Transfer" |
  Select-Object -Property DisplayVersion, InstallDate
Confirm `DisplayVersion` reflects `2025.0.8`, `2025.1.4`, or `2026.0.1` depending on your branch [2].

**2. Verify MOVEit Transfer services are running:**
Get-Service | Where-Object { $_.DisplayName -like "*MOVEit*" } |
  Select-Object Name, Status, StartType
All listed services should show `Running`.

**3. Functional smoke test:**
- Log into the MOVEit Transfer web interface and confirm the application loads.
- Navigate to **Custom Reports** module and confirm it is accessible without errors — this is the affected module per the vulnerability description [1][2].
- Attempt a basic file transfer to confirm core functionality is intact.

**4. Review application event logs for errors post-patch:**
Get-WinEvent -LogName Application -MaxEvents 50 |
  Where-Object { $_.ProviderName -like "*MOVEit*" } |
  Select-Object TimeCreated, LevelDisplayName, Message

**5. Confirm no memory-release errors in MOVEit logs:**
- Check MOVEit Transfer application logs (typically `C:\MOVEitTransfer\Logs\`) for any CWE-401 (missing release of memory) related errors.

**6. Cross-check with NVD and Progress advisory that the installed version is confirmed fixed [1][2].**

