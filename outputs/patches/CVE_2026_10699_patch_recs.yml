## Ansible Remediation Playbook

---
# DRAFT — Analyst review required before operational use.
# CVE-2026-10699 — Progress MOVEit Transfer Memory Release Vulnerability
# Target OS: Windows Server (MOVEit Transfer is a Windows application)
# Adjust installer_path, installer_url, and service names to match your environment.

- name: "Remediate CVE-2026-10699 on {{ target_group }}"
  hosts: "{{ target_group }}"
  gather_facts: true

  vars:
    cve_id: "CVE-2026-10699"
    affected_package: "MOVEit Transfer"
    # ANALYST: Set the fixed version matching your branch (2025.0.8, 2025.1.4, or 2026.0.1)
    fixed_version: "2026.0.1"
    # ANALYST: Update installer_url to the authenticated Progress download URL for your branch
    installer_url: "https://REPLACE_WITH_PROGRESS_DOWNLOAD_URL/MOVEitTransfer-{{ fixed_version }}.exe"
    installer_dest: "C:\\Temp\\MOVEitTransfer-{{ fixed_version }}.exe"
    # ANALYST: Verify service name(s) in your environment with: Get-Service | Where-Object {$_.DisplayName -like "*MOVEit*"}
    moveit_services:
      - "MOVEit DMZ"
      - "MOVEit Transfer"

  tasks:

    - name: "Assert target OS is Windows"
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Windows"
        fail_msg: >
          CVE-2026-10699 remediation requires a Windows target.
          This host reported os_family={{ ansible_os_family }}. Aborting.

    - name: "Ensure staging directory exists"
      ansible.windows.win_file:
        path: "C:\\Temp"
        state: directory

    - name: "Download MOVEit Transfer {{ fixed_version }} installer"
      ansible.windows.win_get_url:
        url: "{{ installer_url }}"
        dest: "{{ installer_dest }}"
        # ANALYST: Add checksum once Progress publishes hash for fixed installer
        # checksum: "sha256:REPLACE_WITH_SHA256"
        # checksum_algorithm: sha256
      register: download_result

    - name: "Stop MOVEit Transfer services before upgrade"
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
        force_dependent_services: true
      loop: "{{ moveit_services }}"
      # ANALYST: Remove services from list that do not exist in your environment
      ignore_errors: true
      register: service_stop_result

    - name: "Run MOVEit Transfer silent upgrade"
      ansible.windows.win_package:
        path: "{{ installer_dest }}"
        # ANALYST: Verify silent install arguments with Progress documentation for your version
        arguments: "/quiet /norestart"
        state: present
      register: patch_result

    - name: "Start MOVEit Transfer services post-upgrade"
      ansible.windows.win_service:
        name: "{{ item }}"
        state: started
        start_mode: auto
      loop: "{{ moveit_services }}"
      when: patch_result.changed
      ignore_errors: true

    - name: "Audit log — patch applied"
      ansible.builtin.debug:
        msg: >
          {{ cve_id }} remediation attempted on {{ inventory_hostname }}
          at {{ ansible_date_time.iso8601 }}.
          Installer changed: {{ patch_result.changed }}.
          Fixed version targeted: {{ fixed_version }}.

    - name: "Write audit record to local log"
      ansible.windows.win_lineinfile:
        path: "C:\\Temp\\cve_patch_audit.log"
        line: >
          {{ ansible_date_time.iso8601 }} | {{ cve_id }} |
          host={{ inventory_hostname }} | version={{ fixed_version }} |
          changed={{ patch_result.changed }}
        create: true

