## Patch Recommendation

> **⚠️ ANALYST REVIEW REQUIRED — This is a proposed draft for analyst review before deployment.**

**CVE:** CVE-2021-42013
**Affected Product:** Apache HTTP Server 2.4.49 and 2.4.50 (CVE-2021-42013 is the incomplete-fix successor to CVE-2021-41773; both versions are vulnerable to path traversal and remote code execution via mod_cgi)
**Fixed Version:** Apache HTTP Server 2.4.51 or later
**Urgency:** IMMEDIATE — Deploy within 24 hours. This vulnerability is actively exploited in the wild (CISA KEV), carries a CVSS score of 9.8 CRITICAL, and enables unauthenticated remote code execution. Priority Tier: CRITICAL — ACT NOW.
**Rollback Risk:**
- Downgrading Apache may restore the vulnerable version; do not roll back without mitigating controls (WAF block rules, network ACLs) in place.
- Configuration directives valid in 2.4.51 are generally backward-compatible with 2.4.49/2.4.50, but regression-test virtual host configs and SSL/TLS settings before rolling back.
- If CGI scripts are in use, verify mod_cgi behaviour after upgrade; the patch tightens path resolution which may affect CGI script paths that were previously resolved loosely.
- Revert procedure: `apt-get install apache2=<previous_version>` using a pinned version string captured pre-upgrade (see audit log task).

